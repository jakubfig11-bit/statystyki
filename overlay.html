<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay Meczowy</title>
    <link rel="stylesheet" href="style-v3.css">
</head>
<body>

    <div class="hud-container">
        <div class="hud-home">
            <img id="home-logo" class="hud-team-logo" src="" alt="" style="display: none;">
            <span id="home-name" class="hud-team-name">GOSPODARZE</span>
        </div>
        
        <div class="hud-center">
            <div id="hud-score" class="hud-score">0 - 0</div>
            <div id="hud-time" class="hud-time">00:00</div>
            <div id="hud-part" class="hud-part">1H</div>
        </div>
        
        <div class="hud-away">
            <img id="away-logo" class="hud-team-logo" src="" alt="" style="display: none;">
            <span id="away-name" class="hud-team-name">GOŚCIE</span>
        </div>
    </div>

    <div id="stat-badge" class="stat-badge-xl-wrapper">
        <div class="stat-badge-xl-stripe"></div>
        <div class="stat-badge-xl-content">
            <div class="stat-badge-xl-left">
                <div class="stat-badge-xl-title">STATYSTYKI MECZU</div>
                <div id="stat-title" class="stat-badge-xl-player">STRZAŁY NA BRAMKĘ</div>
            </div>
            <div class="stat-badge-xl-right">
                <div id="stat-value" class="stat-badge-xl-val">0</div>
            </div>
        </div>
    </div>

    <div id="goal-badge" class="goal-badge-wrapper">
        <div id="goal-stripe" class="goal-badge-club-stripe"></div>
        <div class="goal-badge-main-content">
            <div class="goal-badge-top-row">
                <span class="goal-badge-alert-text">GOOOL!!!</span>
                <span id="goal-time" class="goal-badge-match-time">45'</span>
            </div>
            <div class="goal-badge-bottom-row">
                <span id="goal-team" class="goal-badge-team-name">TEAM</span>
                <span id="goal-player" class="goal-badge-player-info">ZAWODNIK (10)</span>
            </div>
        </div>
    </div>

    <div id="lineup-overlay" class="lineup-tv-fullscreen">
        <div class="lineup-tv-center-block">
            <div class="tactical-pitch-container">
                <div class="pitch-field">
                    <div class="pitch-penalty-box top-box"></div>
                    <div class="pitch-center-line"></div>
                    <div class="pitch-center-circle"></div>
                    <div class="pitch-penalty-box bottom-box"></div>
                    
                    <div class="player-node pos-gk">
                        <div class="player-shirt" id="p-gk-shirt"><span class="p-num" id="l-gk-num">1</span></div>
                        <div class="p-name" id="l-gk-name">Bramkarz</div>
                    </div>
                    <div class="player-node pos-df-l">
                        <div class="player-shirt" id="p-dfl-shirt"><span class="p-num" id="l-dfl-num">2</span></div>
                        <div class="p-name" id="l-dfl-name">Obronca L</div>
                    </div>
                    <div class="player-node pos-df-r">
                        <div class="player-shirt" id="p-dfr-shirt"><span class="p-num" id="l-dfr-num">3</span></div>
                        <div class="p-name" id="l-dfr-name">Obronca P</div>
                    </div>
                    <div class="player-node pos-fw-l">
                        <div class="player-shirt" id="p-fwl-shirt"><span class="p-num" id="l-fwl-num">4</span></div>
                        <div class="p-name" id="l-fwl-name">Atak L</div>
                    </div>
                    <div class="player-node pos-fw-r">
                        <div class="player-shirt" id="p-fwr-shirt"><span class="p-num" id="l-fwr-num">5</span></div>
                        <div class="p-name" id="l-fwr-name">Atak P</div>
                    </div>
                </div>
            </div>
            
            <div class="tactical-sidebar">
                <div class="sidebar-header">
                    <img id="l-team-logo" class="sidebar-team-logo" src="" alt="" style="display:none;">
                    <div>
                        <h1 id="l-team-name">DRUŻYNA</h1>
                        <div class="sidebar-sub">WYJŚCIOWE ZESTAWIENIE</div>
                    </div>
                </div>
                <div class="sidebar-section">
                    <h3>REZERWOWI</h3>
                    <ul class="bench-list">
                        <li id="l-sub1">Zawodnik 6</li>
                        <li id="l-sub2">Zawodnik 7</li>
                    </ul>
                </div>
                <div class="coach-section">
                    <div class="sidebar-sub" style="margin-bottom: 5px;">TRENER</div>
                    <div class="coach-box" id="l-coach">Trener Drużyny</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateOverlay() {
            // 1. Scoreboard
            const homeName = localStorage.getItem('home_name') || 'GOSPODARZE';
            const awayName = localStorage.getItem('away_name') || 'GOŚCIE';
            const homeScore = localStorage.getItem('home_score') || '0';
            const awayScore = localStorage.getItem('away_score') || '0';
            const matchTime = localStorage.getItem('match_time') || '00:00';
            const matchPart = localStorage.getItem('match_part') || '1H';

            document.getElementById('home-name').innerText = homeName.toUpperCase();
            document.getElementById('away-name').innerText = awayName.toUpperCase();
            document.getElementById('hud-score').innerText = `${homeScore} - ${awayScore}`;
            document.getElementById('hud-time').innerText = matchTime;
            document.getElementById('hud-part').innerText = matchPart;

            const homeLogo = localStorage.getItem('home_logo');
            const awayLogo = localStorage.getItem('away_logo');
            const hLogoEl = document.getElementById('home-logo');
            const aLogoEl = document.getElementById('away-logo');

            if (homeLogo) { hLogoEl.src = homeLogo; hLogoEl.style.display = 'block'; } else { hLogoEl.style.display = 'none'; }
            if (awayLogo) { aLogoEl.src = awayLogo; aLogoEl.style.display = 'block'; } else { aLogoEl.style.display = 'none'; }

            // 2. Aktualizacja statystyk bez niszczenia klas CSS
            const statBadge = document.getElementById('stat-badge');
            if (localStorage.getItem('stat_visible') === 'true') {
                const currentText = localStorage.getItem('stat_text') || 'STRZAŁY';
                const currentVal = localStorage.getItem('stat_value') || '0';
                
                document.getElementById('stat-title').innerText = currentText.toUpperCase();
                document.getElementById('stat-value').innerText = currentVal;
                
                statBadge.style.visibility = 'visible';
                statBadge.style.opacity = '1';
            } else {
                statBadge.style.visibility = 'hidden';
                statBadge.style.opacity = '0';
            }

            // 3. Powiadomienie o Bramce
            const goalBadge = document.getElementById('goal-badge');
            if (localStorage.getItem('goal_visible') === 'true') {
                document.getElementById('goal-time').innerText = (localStorage.getItem('goal_time') || '45') + "'";
                document.getElementById('goal-team').innerText = (localStorage.getItem('goal_team') || 'TEAM').toUpperCase();
                document.getElementById('goal-player').innerText = (localStorage.getItem('goal_player') || 'ZAWODNIK').toUpperCase();
                
                const goalStripeColor = localStorage.getItem('goal_color') || '#ff0055';
                document.getElementById('goal-stripe').style.backgroundColor = goalStripeColor;
                document.getElementById('goal-team').style.color = goalStripeColor;

                goalBadge.style.visibility = 'visible';
                goalBadge.style.opacity = '1';
                goalBadge.style.transform = 'translateX(-50%) translateY(0)';
            } else {
                goalBadge.style.transform = 'translateX(-50%) translateY(150px)';
                goalBadge.style.visibility = 'hidden';
                goalBadge.style.opacity = '0';
            }

            // 4. Prezentacja Składów (Lineups)
            const lineupOverlay = document.getElementById('lineup-overlay');
            if (localStorage.getItem('lineup_visible') === 'true') {
                const side = localStorage.getItem('lineup_side') || 'home';
                const prefix = side === 'home' ? 'home' : 'away';
                const teamColor = localStorage.getItem(`${prefix}_color`) || '#ff0055';

                document.getElementById('l-team-name').innerText = (localStorage.getItem(`${prefix}_name`) || 'DRUŻYNA').toUpperCase();
                document.getElementById('l-team-name').style.color = teamColor;

                const teamLogo = localStorage.getItem(`${prefix}_logo`);
                const lLogoEl = document.getElementById('l-team-logo');
                if (teamLogo) { lLogoEl.src = teamLogo; lLogoEl.style.display = 'block'; } else { lLogoEl.style.display = 'none'; }

                const shirts = ['p-gk-shirt', 'p-dfl-shirt', 'p-dfr-shirt', 'p-fwl-shirt', 'p-fwr-shirt'];
                shirts.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.style.backgroundColor = teamColor;
                });

                document.getElementById('l-gk-num').innerText = localStorage.getItem(`lineup_${side}_gk_num`) || '1';
                document.getElementById('l-gk-name').innerText = localStorage.getItem(`lineup_${side}_gk_name`) || 'Bramkarz';
                document.getElementById('l-dfl-num').innerText = localStorage.getItem(`lineup_${side}_dfl_num`) || '2';
                document.getElementById('l-dfl-name').innerText = localStorage.getItem(`lineup_${side}_dfl_name`) || 'Obrońca L';
                document.getElementById('l-dfr-num').innerText = localStorage.getItem(`lineup_${side}_dfr_num`) || '3';
                document.getElementById('l-dfr-name').innerText = localStorage.getItem(`lineup_${side}_dfr_name`) || 'Obrońca P';
                document.getElementById('l-fwl-num').innerText = localStorage.getItem(`lineup_${side}_fwl_num`) || '4';
                document.getElementById('l-fwl-name').innerText = localStorage.getItem(`lineup_${side}_fwl_name`) || 'Atak L';
                document.getElementById('l-fwr-num').innerText = localStorage.getItem(`lineup_${side}_fwr_num`) || '5';
                document.getElementById('l-fwr-name').innerText = localStorage.getItem(`lineup_${side}_fwr_name`) || 'Atak P';

                document.getElementById('l-sub1').innerText = localStorage.getItem(`lineup_${side}_sub1`) || 'Zawodnik R1';
                document.getElementById('l-sub2').innerText = localStorage.getItem(`lineup_${side}_sub2`) || 'Zawodnik R2';
                document.getElementById('l-coach').innerText = localStorage.getItem(`lineup_${side}_coach`) || 'Trener';
                
                document.getElementById('l-sub1').style.borderLeftColor = teamColor;
                document.getElementById('l-sub2').style.borderLeftColor = teamColor;
                document.getElementById('l-coach').style.borderLeftColor = teamColor;

                lineupOverlay.style.visibility = 'visible';
                lineupOverlay.style.opacity = '1';
            } else {
                lineupOverlay.style.visibility = 'hidden';
                lineupOverlay.style.opacity = '0';
            }
        }

        setInterval(updateOverlay, 1000);
        window.onload = updateOverlay;
    </script>
</body>
</html>
