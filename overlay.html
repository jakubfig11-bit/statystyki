<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay Meczowy - Pełna Synchronizacja ze Składami</title>
    <style>
        /* ==========================================
           1. RESET I USTAWIENIA DIZSAJNU
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            background-color: transparent;
        }

        /* ==========================================
           2. STABILNY SCOREBOARD
           ========================================== */
        .hud-container {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #121224;
            border: 2px solid #252547;
            border-radius: 8px;
            height: 60px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            z-index: 10;
            overflow: hidden;
        }

        .hud-home {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 20px;
            height: 100%;
            flex: 1;
            min-width: 200px;
        }

        .hud-away {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 20px;
            height: 100%;
            flex: 1;
            min-width: 200px;
        }

        .hud-center {
            background-color: #090915;
            border-left: 2px solid #252547;
            border-right: 2px solid #252547;
            height: 100%;
            width: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .hud-team-name {
            font-size: 18px;
            font-weight: 800;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .hud-team-logo {
            width: 36px;
            height: 36px;
            object-fit: contain;
            margin: 0 12px;
            flex-shrink: 0;
        }

        .hud-score {
            font-size: 24px;
            font-weight: 900;
            color: #ffffff;
            line-height: 1;
            letter-spacing: 1px;
        }

        .hud-time {
            font-family: monospace;
            font-size: 16px;
            font-weight: 700;
            color: #00f2fe;
            line-height: 1.2;
            margin-top: 2px;
        }

        .hud-part {
            font-size: 10px;
            font-weight: 800;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ==========================================
           3. PLANSZA SKŁADÓW TV (NOWOŚĆ!)
           ========================================== */
        .lineup-board-wrapper {
            position: absolute;
            top: 120px;
            left: 50px;
            width: 420px;
            background: linear-gradient(135deg, #0e0e1f 0%, #161632 100%);
            border: 2px solid #252547;
            border-radius: 12px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            z-index: 5;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            transform: translateX(-500px); /* Domyślnie schowane za ekranem */
            opacity: 0;
            visibility: hidden;
        }

        .lineup-board-wrapper.active {
            transform: translateX(0);
            opacity: 1;
            visibility: visible;
        }

        .lineup-header {
            padding: 18px 20px;
            border-bottom: 2px solid #252547;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .lineup-header-accent {
            width: 8px;
            height: 35px;
            background: #00f2fe;
            border-radius: 4px;
        }

        .lineup-header-title-box {
            display: flex;
            flex-direction: column;
        }

        .lineup-header-team {
            font-size: 22px;
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .lineup-header-sub {
            font-size: 11px;
            font-weight: 700;
            color: #00f2fe;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .lineup-content {
            padding: 20px;
        }

        .lineup-section-title {
            font-size: 11px;
            font-weight: 800;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            margin-top: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 4px;
        }

        .lineup-list {
            list-style: none;
            margin-bottom: 20px;
        }

        .lineup-item {
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: pre-line; /* Pozwala na poprawne łamanie linii z textarea */
        }

        /* ==========================================
           4. SYSTEM STATYSTYK TV XL
           ========================================== */
        .stat-badge-xl-wrapper {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 680px; 
            height: 85px;
            background: linear-gradient(135deg, #121229 0%, #080816 100%);
            border: 2px solid #252547;
            border-radius: 8px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
            z-index: 100;
            transition: opacity 0.3s ease, transform 0.3s ease;
            opacity: 0;
            visibility: hidden;
        }

        .stat-badge-xl-stripe {
            width: 12px;
            height: 100%;
            background: linear-gradient(to bottom, #00f2fe, #4facfe);
            flex-shrink: 0;
        }

        .stat-badge-xl-content {
            flex: 1;
            display: flex;
            padding: 0 0 0 25px;
            align-items: center;
            justify-content: space-between;
            height: 100%;
        }

        .stat-badge-xl-left {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
        }

        .stat-badge-xl-title {
            font-size: 11px;
            font-weight: 900;
            color: #00f2fe; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .stat-badge-xl-player {
            font-size: 22px;
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-badge-xl-right {
            display: flex;
            align-items: center;
            height: 100%;
        }

        .stat-badge-xl-val {
            font-size: 42px;
            font-weight: 900;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.07);
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 30px;
            min-width: 95px;
            border-left: 2px solid #252547;
        }

        /* ==========================================
           5. DOLNA BELKA GOLA (BRAMKA)
           ========================================== */
        .goal-badge-wrapper {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%) translateY(150px);
            width: 620px;
            height: 100px;
            background: linear-gradient(135deg, #06060f 0%, #121220 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
            z-index: 101;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            visibility: hidden;
        }

        .goal-badge-club-stripe {
            width: 12px;
            height: 100%;
            background-color: #ff0055;
        }

        .goal-badge-main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 14px 24px;
            justify-content: center;
        }

        .goal-badge-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .goal-badge-alert-text {
            font-size: 12px;
            font-weight: 800;
            color: #ff0055;
            letter-spacing: 3px;
        }

        .goal-badge-match-time {
            font-size: 14px;
            font-weight: 800;
            color: #a0aec0;
        }

        .goal-badge-bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .goal-badge-team-name {
            font-size: 24px;
            font-weight: 900;
            color: #ff0055;
        }

        .goal-badge-player-info {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="hud-container">
        <div class="hud-home">
            <span id="home-name" class="hud-team-name">GOSPODARZE</span>
            <img id="home-logo" class="hud-team-logo" src="" alt="" style="display: none;">
        </div>
        
        <div class="hud-center">
            <div id="hud-score" class="hud-score">0 - 0</div>
            <div id="hud-time" class="hud-time">00:00</div>
            <div id="hud-part" class="hud-part">1H</div>
        </div>
        
        <div class="hud-away">
            <img id="away-logo" class="hud-team-logo" src="" alt="" style="display: none;">
            <span id="away-name" class="hud-team-name">GOŚCIE</span>
        </div>
    </div>

    <div id="lineup-board" class="lineup-board-wrapper">
        <div class="lineup-header">
            <div id="lineup-accent" class="lineup-header-accent"></div>
            <div class="lineup-header-title-box">
                <span id="lineup-team-title" class="lineup-header-team">DRUŻYNA</span>
                <span class="lineup-header-sub">Skład meczowy</span>
            </div>
        </div>
        <div class="lineup-content">
            <div class="lineup-section-title">Pierwsza piątka / Skład główny</div>
            <div id="lineup-main-list" class="lineup-item"></div>
            
            <div class="lineup-section-title" style="margin-top: 25px;">Rezerwowi</div>
            <div id="lineup-bench-list" class="lineup-item" style="color: #a0aec0; font-size: 14px;"></div>
        </div>
    </div>

    <div id="stat-badge" class="stat-badge-xl-wrapper">
        <div class="stat-badge-xl-stripe" id="stat-stripe"></div>
        <div class="stat-badge-xl-content">
            <div class="stat-badge-xl-left">
                <div id="stat-main-title" class="stat-badge-xl-title">STATYSTYKI INDYWIDUALNE</div>
                <div id="stat-title" class="stat-badge-xl-player">STRZAŁY NA BRAMKĘ</div>
            </div>
            <div class="stat-badge-xl-right">
                <div id="stat-value" class="stat-badge-xl-val">0</div>
            </div>
        </div>
    </div>

    <div id="goal-badge" class="goal-badge-wrapper">
        <div id="goal-stripe" class="goal-badge-club-stripe"></div>
        <div class="goal-badge-main-content">
            <div class="goal-badge-top-row">
                <span class="goal-badge-alert-text">GOOOL!!!</span>
                <span id="goal-time" class="goal-badge-match-time">00'</span>
            </div>
            <div class="goal-badge-bottom-row">
                <span id="goal-team" class="goal-badge-team-name">TEAM</span>
                <span id="goal-player" class="goal-badge-player-info">ZAWODNIK</span>
            </div>
        </div>
    </div>

    <script>
        function updateOverlay() {
            // Nazwy i logotypy
            const homeName = localStorage.getItem('match_home_name') || 'TORINO';
            const awayName = localStorage.getItem('match_away_name') || 'ELCHE';
            document.getElementById('home-name').innerText = homeName.toUpperCase();
            document.getElementById('away-name').innerText = awayName.toUpperCase();

            const homeLogo = localStorage.getItem('match_home_logo');
            const awayLogo = localStorage.getItem('match_away_logo');
            const hLogoEl = document.getElementById('home-logo');
            const aLogoEl = document.getElementById('away-logo');

            if (homeLogo && homeLogo.trim() !== "") { hLogoEl.src = homeLogo; hLogoEl.style.display = 'block'; } else { hLogoEl.style.display = 'none'; }
            if (awayLogo && awayLogo.trim() !== "") { aLogoEl.src = awayLogo; aLogoEl.style.display = 'block'; } else { aLogoEl.style.display = 'none'; }

            // Wyniki, czas, połowa
            const homeScore = localStorage.getItem('match_home_score') || '0';
            const awayScore = localStorage.getItem('match_away_score') || '0';
            document.getElementById('hud-score').innerText = `${homeScore} - ${awayScore}`;

            const timeStr = localStorage.getItem('match_timer_string') || '00:00';
            document.getElementById('hud-time').innerText = timeStr;

            const period = localStorage.getItem('match_period') || '1H';
            document.getElementById('hud-part').innerText = period;

            // OBSŁUGA PLANSZY SKŁADÓW (Zsynchronizowana z panelu kontrolnego)
            const lineupBoard = document.getElementById('lineup-board');
            const isLineupVisible = localStorage.getItem('match_lineup_visible') === 'true';
            
            if (isLineupVisible) {
                const side = localStorage.getItem('match_lineup_side') || 'home';
                const teamTitle = side === 'home' ? homeName : awayName;
                const teamColor = side === 'home' ? (localStorage.getItem('match_home_color') || '#ff0055') : (localStorage.getItem('match_away_color') || '#ffff00');
                
                // Pobieranie wpisanego składu z pamięci panelu
                const mainLineupTxt = localStorage.getItem(`lineup_${side}_main`) || 'Brak wpisanego składu podstawowego.';
                const benchLineupTxt = localStorage.getItem(`lineup_${side}_bench`) || 'Brak rezerwowych.';

                document.getElementById('lineup-team-title').innerText = teamTitle.toUpperCase();
                document.getElementById('lineup-accent').style.backgroundColor = teamColor;
                document.getElementById('lineup-main-list').innerText = mainLineupTxt;
                document.getElementById('lineup-bench-list').innerText = benchLineupTxt;

                lineupBoard.classList.add('active');
            } else {
                lineupBoard.classList.remove('active');
            }

            // Statystyki indywidualne
            const statBadge = document.getElementById('stat-badge');
            const isStatVisible = localStorage.getItem('match_stat_visible') === 'true';
            if (isStatVisible) {
                document.getElementById('stat-main-title').innerText = (localStorage.getItem('match_stat_category') || 'STATYSTYKI').toUpperCase();
                document.getElementById('stat-title').innerText = (localStorage.getItem('match_stat_player') || 'ZAWODNIK').toUpperCase();
                document.getElementById('stat-value').innerText = localStorage.getItem('match_stat_value') || '1';
                
                const teamSide = localStorage.getItem('match_stat_team') || 'home';
                const stripeColor = teamSide === 'home' ? (localStorage.getItem('match_home_color') || '#ff0055') : (localStorage.getItem('match_away_color') || '#ffff00');
                document.getElementById('stat-stripe').style.background = stripeColor;

                statBadge.style.visibility = 'visible';
                statBadge.style.opacity = '1';
            } else {
                statBadge.style.visibility = 'hidden';
                statBadge.style.opacity = '0';
            }

            // Overlay bramki (GOL)
            const goalBadge = document.getElementById('goal-badge');
            const isGoalVisible = localStorage.getItem('match_goal_visible') === 'true';
            if (isGoalVisible) {
                document.getElementById('goal-time').innerText = (localStorage.getItem('match_goal_time') || '00') + "'";
                document.getElementById('goal-team').innerText = (localStorage.getItem('match_goal_team_name') || 'TEAM').toUpperCase();
                document.getElementById('goal-player').innerText = (localStorage.getItem('match_goal_player') || 'ZAWODNIK').toUpperCase();
                
                const goalColor = localStorage.getItem('match_goal_color') || '#ff0055';
                document.getElementById('goal-stripe').style.backgroundColor = goalColor;
                document.getElementById('goal-team').style.color = goalColor;

                goalBadge.style.visibility = 'visible';
                goalBadge.style.opacity = '1';
                goalBadge.style.transform = 'translateX(-50%) translateY(0)';
            } else {
                goalBadge.style.transform = 'translateX(-50%) translateY(150px)';
                goalBadge.style.visibility = 'hidden';
                goalBadge.style.opacity = '0';
            }
        }

        window.addEventListener('storage', updateOverlay);
        setInterval(updateOverlay, 50);
        window.onload = updateOverlay;
    </script>
</body>
</html>
