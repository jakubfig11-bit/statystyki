<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoreboard Overlay</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="overlay-body">
    
    <div id="scoreboard" class="hud-container">
        <div class="hud-side hud-home">
            <span id="hud-home-name" class="hud-team-name">GOSPODARZE</span>
            <span id="hud-home-score" class="hud-score">0</span>
        </div>
        <div class="hud-center">
            <span id="hud-timer" class="hud-time">00:00</span>
            <span id="hud-period" class="hud-part">1H</span>
        </div>
        <div class="hud-side hud-away">
            <span id="hud-away-score" class="hud-score">0</span>
            <span id="hud-away-name" class="hud-team-name">GOŚCIE</span>
        </div>
    </div>

    <div id="goal-badge-container" class="goal-badge-wrapper" style="visibility: hidden;">
        <div id="goal-badge-accent" class="goal-badge-club-stripe"></div>
        
        <div class="goal-badge-main-content">
            <div class="goal-badge-top-row">
                <span class="goal-badge-alert-text">STRZELONY GOL! ⚽</span>
                <span id="goal-badge-time" class="goal-badge-match-time">23:14</span>
            </div>
            <div class="goal-badge-bottom-row">
                <span id="goal-badge-team" class="goal-badge-team-name">ATLETICO MADRYT</span>
                <span id="goal-badge-scorer" class="goal-badge-player-info">10. KOWALSKI</span>
            </div>
        </div>
    </div>

    <div id="lineups-overlay" class="lineups-container" style="visibility: hidden;">
        <div id="lineup-home-col" class="lineup-column lineup-left" style="opacity: 0;">
            <div class="lineup-header-box">
                <h2 id="lineup-home-title" class="lineup-team-title">GOSPODARZE</h2>
            </div>
            <ul id="lineup-home-list" class="lineup-list"></ul>
        </div>
        <div id="lineup-away-col" class="lineup-column lineup-right" style="opacity: 0;">
            <div class="lineup-header-box">
                <h2 id="lineup-away-title" class="lineup-team-title">GOŚCIE</h2>
            </div>
            <ul id="lineup-away-list" class="lineup-list"></ul>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
