<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Overlay Meczowy - Poprawka Layoutu</title>
    <link rel="stylesheet" href="style-v3.css">
    <style>
        /* Całkowite czyszczenie tła, aby w OBS było widać tylko elementy HUD */
        html, body {
            background: transparent !important;
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 1920px;
            height: 1080px;
        }

        /* POPRAWKA: Panel taktyczny boiska/składów nie może być wielkim czarnym blokiem */
        .lineups-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4) !important; /* Delikatne przyciemnienie zamiast czarnej ściany */
            display: none; /* Domyślnie ukryty, aktywowany klasą */
            z-index: 5000;
        }
        .lineups-overlay.active {
            display: flex !important;
        }

        /* POPRAWKA: Statystyki - domyślnie schowane, żeby nie robiły syfu */
        .stat-badge-container {
            position: absolute;
            top: 150px;
            left: 50%;
            transform: translateX(-50%) translateY(-200px);
            transition: transform 0.4s ease-out;
            z-index: 6000;
            opacity: 0;
        }
        .stat-badge-container.active {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Dynamiczna belka bramkowa (z dołu) */
        #custom-goal-badge {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%) translateY(300px);
            width: 550px;
            height: 90px;
            background: rgba(14, 14, 28, 0.95);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            overflow: hidden;
            z-index: 9999;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #custom-goal-badge.active {
            transform: translateX(-50%) translateY(0);
        }
        #goal-accent { width: 10px; height: 100%; background: #ff0055; flex-shrink: 0; }
        .goal-logo-box { width: 80px; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(255, 255, 255, 0.02); padding: 10px; }
        #goal-logo-img { width: 100%; height: 100%; object-fit: contain; }
        .goal-details { flex: 1; padding: 0 20px; display: flex; flex-direction: column; justify-content: center; }
        .goal-title-row { display: flex; align-items: baseline; gap: 8px; }
        .goal-alert { font-size: 20px; font-weight: 900; color: #00ffaa; text-transform: uppercase; }
        #goal-team-name { font-size: 13px; font-weight: 800; text-transform: uppercase; color: #ff0055; }
        #goal-player-nick { font-size: 24px; font-weight: 800; color: #fff; text-transform: uppercase; }
        .goal-time-box { padding: 0 20px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); }
        .goal-time-lbl { font-size: 9px; color: #718096; text-transform: uppercase; }
        #goal-time-val { font-size: 22px; font-weight: 900; color: #fff; font-family: monospace; }
    </style>
</head>
<body>

    <!-- TV SCOREBOARD (HUD) - Trzymamy strukturę z Twojego style-v3.css -->
    <div class="hud-container">
        <div class="hud-home">
            <span class="hud-team-name" id="dsp-home-name">TORINO</span>
            <img class="hud-logo" id="dsp-home-logo" src="" alt="" style="display:none;">
        </div>
        <div class="hud-center">
            <div class="hud-score" id="dsp-score">0 - 0</div>
            <div class="hud-mid-info">
                <div class="hud-timer" id="dsp-timer">00:00</div>
                <div class="hud-period" id="dsp-period">1H</div>
            </div>
        </div>
        <div class="hud-away">
            <img class="hud-logo" id="dsp-away-logo" src="" alt="" style="display:none;">
            <span class="hud-team-name" id="dsp-away-name">ELCHE</span>
        </div>
    </div>

    <!-- DYNAMICZNA BELKA GOLOWA (CHOWANA NA DOLE) -->
    <div id="custom-goal-badge">
        <div id="goal-accent"></div>
        <div class="goal-logo-box">
            <img id="goal-logo-img" src="" alt="" style="display:none;">
        </div>
        <div class="goal-details">
            <div class="goal-title-row">
                <span class="goal-alert">GOL!</span>
                <span id="goal-team-name">DRUŻYNA</span>
            </div>
            <div id="goal-player-nick">ZAWODNIK</div>
        </div>
        <div class="goal-time-box">
            <span class="goal-time-lbl">Minuta</span>
            <div id="goal-time-val">00:00</div>
        </div>
    </div>

    <!-- KWADRAT STATYSTYK (UKRYTY DOPÓKI NIE KLIKNIESZ "POKAŻ") -->
    <div class="stat-badge-container" id="stat-panel">
        <div class="stat-badge-accent" id="stat-accent"></div>
        <div class="stat-main">
            <div class="stat-badge-player-name" id="stat-dsp-player">Zawodnik</div>
            <div class="stat-badge-category" id="stat-dsp-cat">Punkty</div>
        </div>
        <div class="stat-badge-value" id="stat-dsp-val">1</div>
    </div>

    <!-- TAKTYCZNE BOISKO (WYSWIETLANE TYLKO GDY WŁĄCZONE) -->
    <div class="lineups-overlay" id="pitch-overlay">
        <div class="lineup-tv-center-block">
            <div class="pitch-visualizer">
                <div class="pitch-mock">
                    <div class="player-node pos-gk" id="p1"><div class="badge">1</div><span class="p-name">Bramkarz</span></div>
                    <div class="player-node pos-df-l" id="p2"><div class="badge">2</div><span class="p-name">Obrońca L</span></div>
                    <div class="player-node pos-df-r" id="p3"><div class="badge">3</div><span class="p-name">Obrońca P</span></div>
                    <div class="player-node pos-fw-l" id="p4"><div class="badge">4</div><span class="p-name">Napastnik L</span></div>
                    <div class="player-node pos-fw-r" id="p5"><div class="badge">5</div><span class="p-name">Napastnik P</span></div>
                </div>
            </div>
            <div class="tactical-sidebar">
                <div class="sidebar-header">
                    <img class="sidebar-team-logo" id="side-team-logo" src="" alt="" style="display:none;">
                    <div>
                        <h1 id="side-team-title">TEAM</h1>
                        <span class="sidebar-sub">WYJŚCIOWA PIĄTKA</span>
                    </div>
                </div>
                <div class="sidebar-section" style="flex:1;">
                    <h3>ZAWODNICY REZERWOWI</h3>
                    <div id="side-bench-list" style="white-space: pre-line;"></div>
                </div>
                <div class="sidebar-section">
                    <h3>GŁÓWNY TRENER</h3>
                    <div id="side-coach-name"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let lastGoalTimestamp = 0;
        let goalTimeout = null;

        function updateOverlay() {
            // Synchronizacja tekstu scoreboardu
            document.getElementById('dsp-home-name').innerText = localStorage.getItem('homeName') || 'TORINO';
            document.getElementById('dsp-away-name').innerText = localStorage.getItem('awayName') || 'ELCHE';
            
            let hs = localStorage.getItem('homeScore') || '0';
            let as = localStorage.getItem('awayScore') || '0';
            document.getElementById('dsp-score').innerText = `${hs} - ${as}`;

            let totalSecs = parseInt(localStorage.getItem('timerSeconds')) || 0;
            let m = Math.floor(totalSecs / 60).toString().padStart(2, '0');
            let s = (totalSecs % 60).toString().padStart(2, '0');
            document.getElementById('dsp-timer').innerText = `${m}:${s}`;
            document.getElementById('dsp-period').innerText = localStorage.getItem('period') || '1H';

            // Logotypy drużyn w HUD
            let hl = localStorage.getItem('homeLogo');
            let al = localStorage.getItem('awayLogo');
            let hImg = document.getElementById('dsp-home-logo');
            let aImg = document.getElementById('dsp-away-logo');

            if(hl && hl.length > 5) { hImg.src = hl; hImg.style.display='inline-block'; } else { hImg.style.display='none'; }
            if(al && al.length > 5) { aImg.src = al; aImg.style.display='inline-block'; } else { aImg.style.display='none'; }

            // Kolory czcionek w HUD
            document.getElementById('dsp-home-name').style.color = localStorage.getItem('homeTextColor') || '#ffffff';
            document.getElementById('dsp-away-name').style.color = localStorage.getItem('awayTextColor') || '#ffffff';

            // Zarządzanie panelem statystyk (Ukrywanie/Pokazywanie)
            let statPanel = document.getElementById('stat-panel');
            if(localStorage.getItem('showStatPanel') === 'true') {
                document.getElementById('stat-dsp-player').innerText = localStorage.getItem('stat_cur_player');
                document.getElementById('stat-dsp-cat').innerText = localStorage.getItem('stat_cur_cat').toUpperCase();
                document.getElementById('stat-dsp-val').innerText = localStorage.getItem('stat_cur_val');
                statPanel.classList.add('active');
            } else {
                statPanel.classList.remove('active');
            }

            // Zarządzanie składami i boiskiem taktycznym
            let pitchOverlay = document.getElementById('pitch-overlay');
            let showHome = localStorage.getItem('showHomeLineup') === 'true';
            let showAway = localStorage.getItem('showAwayLineup') === 'true';

            if(showHome || showAway) {
                pitchOverlay.classList.add('active');
                let side = showHome ? 'home' : 'away';
                
                document.getElementById('side-team-title').innerText = localStorage.getItem(`${side}Name`);
                document.getElementById('side-team-title').style.color = localStorage.getItem(`${side}Color`);
                document.getElementById('side-coach-name').innerText = localStorage.getItem(`${side}Coach`) || '';
                
                let sLogo = localStorage.getItem(`${side}Logo`);
                let sideLogoImg = document.getElementById('side-team-logo');
                if(sLogo && sLogo.length > 5) { sideLogoImg.src = sLogo; sideLogoImg.style.display='block'; } else { sideLogoImg.style.display='none'; }

                document.getElementById('side-bench-list').innerText = localStorage.getItem(`bench${side.charAt(0).toUpperCase() + side.slice(1)}`) || '';

                fillPitchPlayers(`lineup${side.charAt(0).toUpperCase() + side.slice(1)}`, localStorage.getItem(`${side}Color`), localStorage.getItem(`${side}TextColor`));
            } else {
                pitchOverlay.classList.remove('active');
            }

            // Sprawdzanie triggeru bramki
            let goalEventRaw = localStorage.getItem('goal_event_trigger');
            if(goalEventRaw) {
                let goalEvent = JSON.parse(goalEventRaw);
                if(goalEvent.timestamp > lastGoalTimestamp) {
                    lastGoalTimestamp = goalEvent.timestamp;
                    triggerGoalAnimation(goalEvent);
                }
            }
        }

        function fillPitchPlayers(storageKey, teamColor, textColor) {
            const rawData = localStorage.getItem(storageKey) || "";
            const players = rawData.split('\n').map(p => p.trim()).filter(p => p.length > 0);
            for (let i = 1; i <= 5; i++) {
                const playerNode = document.getElementById(`p${i}`);
                if (players[i - 1]) {
                    const match = players[i - 1].match(/^(\\d+)[.\\s-]*\\s*(.*)$/);
                    let shirtBadge = i;
                    let pName = players[i - 1];
                    if (match) { shirtBadge = match[1]; pName = match[2]; }
                    
                    let shirt = playerNode.querySelector('.badge');
                    shirt.innerText = shirtBadge;
                    shirt.style.backgroundColor = teamColor;
                    shirt.style.color = textColor;
                    
                    playerNode.querySelector('.p-name').innerText = pName;
                    playerNode.style.display = 'flex';
                } else { playerNode.style.display = 'none'; }
            }
        }

        function triggerGoalAnimation(data) {
            let badge = document.getElementById('custom-goal-badge');
            let accent = document.getElementById('goal-accent');
            let teamLbl = document.getElementById('goal-team-name');
            let logoImg = document.getElementById('goal-logo-img');

            document.getElementById('goal-player-nick').innerText = data.scorer;
            document.getElementById('goal-team-name').innerText = data.team;
            document.getElementById('goal-time-val').innerText = data.time;

            accent.style.backgroundColor = data.color;
            teamLbl.style.color = data.color;

            if(data.logo && data.logo.length > 5) {
                logoImg.src = data.logo;
                logoImg.style.display = 'block';
            } else {
                logoImg.style.display = 'none';
            }

            badge.classList.add('active');

            clearTimeout(goalTimeout);
            goalTimeout = setTimeout(() => {
                badge.classList.remove('active');
            }, 7000);
        }

        window.addEventListener('storage', updateOverlay);
        setInterval(updateOverlay, 200);
        window.onload = updateOverlay;
    </script>
</body>
</html>
