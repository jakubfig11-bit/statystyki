<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Overlay Stream</title>
    <link rel="stylesheet" href="style-v3.css">
</head>
<body>

    <div class="hud-container">
        <div class="hud-home">
            <span class="hud-team-name" id="m-home-name">TORINO</span>
            <img class="hud-logo" id="m-home-logo" src="" alt="" style="display:none;">
        </div>
        <div class="hud-center">
            <div class="hud-score" id="m-score">0 - 0</div>
            <div class="hud-mid-info">
                <div class="hud-timer" id="m-timer">00:00</div>
                <div class="hud-period" id="m-period">1H</div>
            </div>
        </div>
        <div class="hud-away">
            <img class="hud-logo" id="m-away-logo" src="" alt="" style="display:none;">
            <span class="hud-team-name" id="m-away-name">ELCHE</span>
        </div>
    </div>

    <div class="stat-badge-container" id="m-stat-box">
        <div class="stat-badge-accent"></div>
        <div class="stat-main">
            <div class="stat-badge-player-name" id="m-stat-player">Zawodnik</div>
            <div class="stat-badge-category" id="m-stat-cat">Statystyka</div>
        </div>
        <div class="stat-badge-value" id="m-stat-val">0</div>
    </div>

    <div class="lineups-overlay" id="m-pitch-box">
        <div class="lineup-tv-center-block">
            <div class="pitch-visualizer">
                <div class="pitch-mock">
                    <div class="player-node pos-gk" id="node-1"><div class="badge">1</div><span class="p-name">-</span></div>
                    <div class="player-node pos-df-l" id="node-2"><div class="badge">2</div><span class="p-name">-</span></div>
                    <div class="player-node pos-df-r" id="node-3"><div class="badge">3</div><span class="p-name">-</span></div>
                    <div class="player-node pos-fw-l" id="node-4"><div class="badge">4</div><span class="p-name">-</span></div>
                    <div class="player-node pos-fw-r" id="node-5"><div class="badge">5</div><span class="p-name">-</span></div>
                </div>
            </div>
            <div class="tactical-sidebar">
                <div class="sidebar-header">
                    <img class="sidebar-team-logo" id="m-side-logo" src="" alt="" style="display:none;">
                    <div>
                        <h1 id="m-side-title">TEAM</h1>
                        <span class="sidebar-sub">WYJŚCIOWA PIĄTKA</span>
                    </div>
                </div>
                <div class="sidebar-section" style="flex:1;">
                    <h3>ZAWODNICY REZERWOWI</h3>
                    <div id="m-side-bench" style="white-space: pre-line; color:#a0aec0; font-size:14px; line-height:1.5;"></div>
                </div>
                <div class="sidebar-section">
                    <h3>GŁÓWNY TRENER</h3>
                    <div id="m-side-coach" style="font-weight:bold; color:#fff; text-transform:uppercase; font-size:14px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
