<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Broadcast Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; width: 1920px; height: 1080px;
            overflow: hidden; background: transparent;
            font-family: 'Montserrat', sans-serif;
        }

        /* ==========================================
           1. PANEL HUD (TABLICA WYNIKÓW GÓRA)
           ========================================== */
        .hud-container {
            position: absolute; top: 20px; left: 30px;
            display: flex; align-items: center;
            background: rgba(13, 15, 20, 0.95);
            border: 2px solid #232731; border-radius: 8px;
            padding: 6px 15px; color: white; font-weight: 700; font-size: 14px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5); z-index: 10;
        }
        .hud-team { display: flex; align-items: center; gap: 8px; min-width: 90px; }
        .hud-team.home { justify-content: flex-end; text-align: right; }
        .hud-team.away { justify-content: flex-start; text-align: left; }
        .hud-logo { width: 22px; height: 22px; object-fit: contain; }
        .hud-logo.hidden { display: none; }
        
        .hud-score-wrapper {
            background: #1c2130; border-radius: 4px;
            padding: 4px 12px; margin: 0 12px;
            font-size: 16px; font-weight: 900; color: #ffffff;
            display: flex; gap: 6px; align-items: center;
        }
        .hud-timer { color: #f5b041; font-weight: 800; min-width: 50px; text-align: center; margin-left: 5px; }
        .team-accent { width: 5px; height: 18px; border-radius: 2px; }

        /* ==========================================
           2. ANIMACJA CIESZYNKI PO GOLU
           ========================================== */
        #goal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            z-index: 100; pointer-events: none;
        }
        .goal-tv-card {
            width: 420px; background: #0d0f14; border: 2px solid #232731; border-radius: 16px;
            padding: 20px; text-align: center; color: white; position: relative; overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
        }
        #goal-card-accent { position: absolute; bottom: 0; left: 0; width: 100%; border-bottom: 6px solid #0052cc; }
        .goal-title { font-size: 38px; font-weight: 900; letter-spacing: 2px; margin: 0; color: #fff; text-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        #goal-scorer { font-size: 16px; font-weight: 800; color: #ffffff; margin: 8px 0 2px 0; letter-spacing: 0.5px; }
        #goal-team { font-size: 12px; font-weight: 700; color: #838996; text-transform: uppercase; }
        #goal-time { font-size: 12px; font-weight: 800; color: #f5b041; background: rgba(245,176,65,0.1); padding: 2px 8px; border-radius: 4px; display: inline-block; margin-top: 10px; }
        #goal-bg-logo { position: absolute; top: 50%; left: 50%; width: 150px; height: 150px; object-fit: contain; transform: translate(-50%, -50%); opacity: 0.04; pointer-events: none; }

        /* ==========================================
           3. SKŁAD WYJŚCIOWY (TAKTYCZNA MAKIETA BOISKA)
           ========================================== */
        #tactical-lineups-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.2); z-index: 90;
        }
        .tactical-card {
            width: 780px; background: #0d0f14; border: 2px solid #232731; border-radius: 20px;
            padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); box-sizing: border-box;
        }
        .tactical-header { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; }
        #tactical-top-logo { width: 60px; height: 60px; object-fit: contain; }
        #tactical-top-logo.hidden { display: none; }
        .header-text h1 { color: #ffffff; font-size: 32px; font-weight: 800; margin: 0; letter-spacing: 1px; }
        .header-text p { color: #838996; font-size: 14px; font-weight: 600; margin: 4px 0 0 0; letter-spacing: 0.5px; }
        
        /* Render wirtualnego zielono-ciemnego boiska */
        .pitch-container { position: relative; width: 100%; height: 420px; background: #121620; border: 1.5px solid #242936; border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
        .pitch-line { position: absolute; border: 1px solid rgba(255, 255, 255, 0.04); }
        .center-line { top: 0; bottom: 0; left: 50%; width: 0; }
        .center-circle { top: 50%; left: 50%; width: 120px; height: 120px; border-radius: 50%; transform: translate(-50%, -50%); }
        .penalty-area-left { top: 15%; bottom: 15%; left: 0; width: 100px; }
        .pitch-watermark { position: absolute; top: 50%; left: 50%; width: 180px; height: 180px; object-fit: contain; transform: translate(-50%, -50%); opacity: 0.06; pointer-events: none; }
        .pitch-watermark.hidden { display: none; }

        /* Elementy zawodników */
        .tactical-player { position: absolute; display: flex; flex-direction: column; align-items: center; gap: 8px; width: 110px; text-align: center; }
        .player-shirt { width: 44px; height: 44px; background: #1c2130; border: 2px solid #ffffff; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        .player-number { color: #ffffff; font-size: 16px; font-weight: 700; }
        .player-name { color: #ffffff; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); background: rgba(13, 15, 20, 0.85); padding: 3px 8px; border-radius: 4px; width: 100%; max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Dolna belka dla rezerwy */
        .tactical-subs-bar { background: #121620; border: 1px solid #242936; border-radius: 8px; padding: 12px 20px; display: flex; gap: 10px; font-size: 13px; }
        .subs-label { color: #626875; font-weight: 700; }
        .subs-values { color: #c5cbd3; font-weight: 600; }
    </style>
</head>
<body>

    <div class="hud-container">
        <div class="hud-team home">
            <span id="hud-home-name">HOME</span>
            <img id="hud-home-logo" class="hud-logo hidden" src="" alt="L">
        </div>
        <div id="hud-home-accent" class="team-accent"></div>
        
        <div class="hud-score-wrapper">
            <span id="hud-home-score">0</span>
            <span style="color: rgba(255,255,255,0.3); font-size:12px;">:</span>
            <span id="hud-away-score">0</span>
        </div>
        
        <div id="hud-away-accent" class="team-accent"></div>
        <div class="hud-team away">
            <img id="hud-away-logo" class="hud-logo hidden" src="" alt="R">
            <span id="hud-away-name">AWAY</span>
        </div>
        <div id="hud-timer" class="hud-timer">00:00</div>
    </div>

    <div id="goal-overlay" style="visibility: hidden;">
        <div class="goal-tv-card">
            <img id="goal-bg-logo" class="hidden" src="" alt="BG">
            <h1 class="goal-title">GOL!</h1>
            <div id="goal-scorer">ZAWODNIK</div>
            <div id="goal-team">DRUŻYNA</div>
            <div id="goal-time">00:00</div>
            <div id="goal-card-accent"></div>
        </div>
    </div>

    <div id="tactical-lineups-overlay" style="visibility: hidden;">
        <div class="tactical-card">
            <div class="tactical-header">
                <img id="tactical-top-logo" class="hidden" src="" alt="Crest">
                <div class="header-text">
                    <h1 id="tactical-team-name">TORINO</h1>
                    <p id="tactical-coach-name">TRENER: PEP GUARDIOLA</p>
                </div>
            </div>

            <div class="pitch-container">
                <img id="tactical-bg-logo" class="pitch-watermark hidden" src="" alt="WM">
                <div class="pitch-line center-line"></div>
                <div class="pitch-line center-circle"></div>
                <div class="pitch-line penalty-area-left"></div>

                <div class="tactical-player" id="tactical-p1" style="left: 12%; top: 50%; transform: translate(-50%, -50%);">
                    <div class="player-shirt"><span class="player-number">1</span></div>
                    <div class="player-name">NEUER</div>
                </div>
                <div class="tactical-player" id="tactical-p2" style="left: 35%; top: 28%; transform: translate(-50%, -50%);">
                    <div class="player-shirt"><span class="player-number">2</span></div>
                    <div class="player-name">KIWIOR</div>
                </div>
                <div class="tactical-player" id="tactical-p3" style="left: 35%; top: 72%; transform: translate(-50%, -50%);">
                    <div class="player-shirt"><span class="player-number">3</span></div>
                    <div class="player-name">TYAN</div>
                </div>
                <div class="tactical-player" id="tactical-p4" style="left: 58%; top: 44%; transform: translate(-50%, -50%);">
                    <div class="player-shirt"><span class="player-number">4</span></div>
                    <div class="player-name">NEYMAR</div>
                </div>
                <div class="tactical-player" id="tactical-p5" style="left: 78%; top: 56%; transform: translate(-50%, -50%);">
                    <div class="player-shirt"><span class="player-number">5</span></div>
                    <div class="player-name">RONALDO</div>
                </div>
            </div>

            <div class="tactical-subs-bar">
                <span class="subs-label">REZERWOWI:</span>
                <span id="tactical-subs-list" class="subs-values">Dkny, Dejv, Messi</span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="app.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            initOverlayView();
        });
    </script>
</body>
</html>
