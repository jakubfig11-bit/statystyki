<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Broadcast Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; width: 1920px; height: 1080px; overflow: hidden; background: transparent; font-family: 'Montserrat', sans-serif; }

        /* ==========================================
           1. SCOREBOARD
           ========================================== */
        .hud-wrapper {\n            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; z-index: 10;
        }
        .hud-main-scoreboard {
            display: flex; align-items: center;
            background: #0d0f14; border: 2px solid #232731; border-radius: 12px;
            height: 65px; min-width: 650px; overflow: hidden;
            box-shadow: 0 12px 24px rgba(0,0,0,0.6);
        }
        .hud-crest-box { width: 70px; height: 100%; display: flex; align-items: center; justify-content: center; background: #161a23; padding: 10px; }
        .hud-crest { max-width: 100%; max-height: 100%; object-fit: contain; }
        .hud-team-name { font-size: 20px; font-weight: 800; color: #ffffff; padding: 0 25px; text-transform: uppercase; letter-spacing: 1px; min-width: 180px; text-align: center; flex-grow: 1; }
        .hud-score-box { background: #1c212e; height: 100%; min-width: 70px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 900; color: #ffffff; border-left: 1px solid #232731; border-right: 1px solid #232731; }
        .hud-divider { font-size: 24px; font-weight: 700; color: #8a94a6; padding: 0 5px; background: #1c212e; height: 100%; display: flex; align-items: center; }
        .hud-timer-box { background: #0d0f14; height: 100%; min-width: 100px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 800; color: #ffbb33; padding: 0 20px; }
        
        .hud-color-indicator { width: 6px; height: 100%; }

        /* ==========================================
           2. GOAL LIVE ANIMATION
           ========================================== */
        .goal-popup-container { position: absolute; top: 150px; left: 50%; transform: translateX(-50%); visibility: hidden; z-index: 5; }
        .goal-popup-card { background: #0d0f14; border: 3px solid #00c851; border-radius: 16px; padding: 25px 50px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 20px 40px rgba(0,0,0,0.7); min-width: 500px; position: relative; overflow: hidden; }
        .goal-popup-title { font-size: 42px; font-weight: 900; color: #00c851; margin: 0; letter-spacing: 4px; text-transform: uppercase; text-shadow: 0 0 10px rgba(0,200,81,0.4); }
        .goal-popup-player { font-size: 26px; font-weight: 800; color: #ffffff; margin-top: 10px; text-transform: uppercase; }
        .goal-popup-team { font-size: 16px; font-weight: 700; color: #8a94a6; margin-top: 5px; letter-spacing: 2px; text-transform: uppercase; }
        .goal-popup-accent-bar { position: absolute; bottom: 0; left: 0; height: 6px; width: 100%; background: #00c851; }

        /* ==========================================
           3. SUBSTITUTION
           ========================================== */
        .sub-popup-container { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); visibility: hidden; z-index: 5; }
        .sub-popup-card { background: #0d0f14; border: 2px solid #232731; border-radius: 14px; padding: 20px 40px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); min-width: 550px; border-bottom: 5px solid #aa00ff; }
        .sub-popup-header { font-size: 14px; font-weight: 800; color: #aa00ff; letter-spacing: 3px; text-transform: uppercase; text-align: center; margin: 0; }
        .sub-row { display: flex; align-items: center; justify-content: space-between; gap: 30px; }
        .sub-player-box { display: flex; align-items: center; gap: 15px; width: 45%; }
        .sub-player-box.out { justify-content: flex-end; color: #ff4444; }
        .sub-player-box.in { justify-content: flex-start; color: #00c851; }
        .sub-icon { font-size: 24px; font-weight: 900; }
        .sub-name { font-size: 20px; font-weight: 800; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }

        /* ==========================================
           4. MATCH SUMMARY BOARD (HALFTIME/FULLTIME)
           ========================================== */
        .summary-board-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); visibility: hidden; z-index: 4; }
        .summary-board-card { background: #0d0f14; border: 2px solid #232731; border-radius: 20px; width: 850px; padding: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.8); position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .summary-board-header { font-size: 24px; font-weight: 900; color: #ffbb33; text-align: center; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 35px; border-bottom: 2px solid #232731; padding-bottom: 15px; }
        .summary-board-main { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
        .summary-board-team { display: flex; flex-direction: column; align-items: center; width: 35%; gap: 15px; }
        .summary-board-logo { width: 100px; height: 100px; object-fit: contain; }
        .summary-board-team-name { font-size: 24px; font-weight: 800; color: #ffffff; text-transform: uppercase; text-align: center; letter-spacing: 1px; }
        .summary-board-result-box { width: 30%; display: flex; align-items: center; justify-content: center; font-size: 64px; font-weight: 900; color: #ffffff; background: #161a23; border-radius: 12px; height: 110px; border: 1px solid #232731; }
        
        .summary-board-scorers-area { display: flex; justify-content: space-between; border-top: 1px solid #232731; padding-top: 20px; min-height: 100px; }
        .summary-scorers-column { width: 45%; display: flex; flex-direction: column; gap: 8px; font-size: 15px; color: #e2e8f0; font-weight: 600; }
        .summary-scorers-column.home-side { align-items: flex-start; text-align: left; }
        .summary-scorers-column.away-side { align-items: flex-end; text-align: right; }
        
        .summary-board-footer-accent { position: absolute; bottom: 0; left: 0; width: 100%; height: 8px; display: flex; }
        .summary-footer-half { width: 50%; height: 100%; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="hud-wrapper">
        <div class="hud-main-scoreboard">
            <div id="hud-color-home" class="hud-color-indicator" style="background-color: #0052cc;"></div>
            <div class="hud-crest-box">
                <img id="hud-logo-home" src="" class="hud-crest hidden" alt="Home Logo">
            </div>
            <div id="hud-name-home" class="hud-team-name">HOME</div>
            
            <div id="hud-score-home" class="hud-score-box">0</div>
            <div class="hud-divider">:</div>
            <div id="hud-score-away" class="hud-score-box">0</div>
            
            <div id="hud-name-away" class="hud-team-name">AWAY</div>
            <div class="hud-crest-box">
                <img id="hud-logo-away" src="" class="hud-crest hidden" alt="Away Logo">
            </div>
            <div id="hud-color-away" class="hud-color-indicator" style="background-color: #ff0044;"></div>
            
            <div class="hud-timer-box">
                <span id="hud-timer">00:00</span>
            </div>
        </div>
    </div>

    <div id="goal-live-container" class="goal-popup-container">
        <div class="goal-popup-card">
            <p class="goal-popup-title">⚽ GOOOL !!!</p>
            <div id="goal-popup-player-name" class="goal-popup-player">ZAWODNIK</div>
            <div id="goal-popup-team-name" class="goal-popup-team">DRUŻYNA</div>
            <div class="goal-popup-accent-bar"></div>
        </div>
    </div>

    <div id="sub-live-container" class="sub-popup-container">
        <div class="sub-popup-card">
            <p class="sub-popup-header">🔄 ZMIANA W ZESPOLE</p>
            <div class="sub-row">
                <div class="sub-player-box out">
                    <span id="sub-player-out-name" class="sub-name">ZAWODNIK OUT</span>
                    <span class="sub-icon">🔴</span>
                </div>
                <div style="font-size: 22px; font-weight: 800; color: #8a94a6;">/</div>
                <div class="sub-player-box in">
                    <span class="sub-icon">🟢</span>
                    <span id="sub-player-in-name" class="sub-name">ZAWODNIK IN</span>
                </div>
            </div>
        </div>
    </div>

    <div id="summary-board-container" class="summary-board-container">
        <div class="summary-board-card">
            <div id="summary-board-title" class="summary-board-header">HALFTIME MATCH SUMMARY</div>
            
            <div class="summary-board-main">
                <div class="summary-board-team">
                    <img id="summary-board-logo-home" src="" class="summary-board-logo hidden" alt="Home Logo">
                    <span class="summary-board-team-name" id="summary-board-name-home">HOME</span>
                </div>
                
                <div class="summary-board-result-box">
                    <span id="summary-board-score-home">0</span>
                    <span style="margin: 0 8px;">-</span>
                    <span id="summary-board-score-away">0</span>
                </div>
                
                <div class="summary-board-team">
                    <img id="summary-board-logo-away" src="" class="summary-board-logo hidden" alt="Away Logo">
                    <span class="summary-board-team-name" id="summary-board-name-away">AWAY</span>
                </div>
            </div>
            
            <div class="summary-board-scorers-area">
                <div class="summary-scorers-column home-side" id="summary-scorers-list-home"></div>
                <div class="summary-scorers-column away-side" id="summary-scorers-list-away"></div>
            </div>

            <div class="summary-board-footer-accent">
                <div id="summary-footer-accent-home" class="summary-footer-half" style="background-color: #0052cc;"></div>
                <div id="summary-footer-accent-away" class="summary-footer-half" style="background-color: #ff0044;"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            connectToBroadcast();
        });

        let animatedGoalTrigger = false;
        let animatedSubTrigger = false;
        let currentDisplayedSummary = "NONE";

        function updateOverlayUI() {
            // Główna belka wyniku (HUD)
            document.getElementById('hud-name-home').innerText = currentMatchState.home_name;
            document.getElementById('hud-name-away').innerText = currentMatchState.away_name;
            document.getElementById('hud-score-home').innerText = currentMatchState.home_score;
            document.getElementById('hud-score-away').innerText = currentMatchState.away_score;
            document.getElementById('hud-timer').innerText = formatTime(currentMatchState.match_time);
            
            document.getElementById('hud-color-home').style.backgroundColor = currentMatchState.home_color || "#0052cc";
            document.getElementById('hud-color-away').style.backgroundColor = currentMatchState.away_color || "#ff0044";
            
            setupCrest('hud-logo-home', currentMatchState.home_logo);
            setupCrest('hud-logo-away', currentMatchState.away_logo);

            // Podsumowanie meczu / przerwy
            document.getElementById('summary-board-name-home').innerText = currentMatchState.home_name;
            document.getElementById('summary-board-name-away').innerText = currentMatchState.away_name;
            document.getElementById('summary-board-score-home').innerText = currentMatchState.home_score;
            document.getElementById('summary-board-score-away').innerText = currentMatchState.away_score;
            
            document.getElementById('summary-footer-accent-home').style.backgroundColor = currentMatchState.home_color || "#0052cc";
            document.getElementById('summary-footer-accent-away').style.backgroundColor = currentMatchState.away_color || "#ff0044";
            
            setupCrest('summary-board-logo-home', currentMatchState.home_logo);
            setupCrest('summary-board-logo-away', currentMatchState.away_logo);
            
            renderSummaryScorers();
            handleSummaryAnimationLogic();

            // Animacja Gola Live
            if (currentMatchState.show_goal_trigger && !animatedGoalTrigger) {
                triggerGoalLiveAnimation();
            }
            
            // Animacja Zmiany Zawodnika
            if (currentMatchState.show_sub_trigger && !animatedSubTrigger) {
                triggerSubLiveAnimation();
            } else if (!currentMatchState.show_sub_trigger && animatedSubTrigger) {
                hideSubLiveAnimation();
            }
        }

        function renderSummaryScorers() {
            const homeList = document.getElementById('summary-scorers-list-home');
            const awayList = document.getElementById('summary-scorers-list-away');
            if(!homeList || !awayList) return;
            
            homeList.innerHTML = "";
            awayList.innerHTML = "";
            
            const homeGoals = currentMatchState.home_goals_list ? currentMatchState.home_goals_list.split('|').filter(Boolean) : [];
            const awayGoals = currentMatchState.away_goals_list ? currentMatchState.away_goals_list.split('|').filter(Boolean) : [];
            
            homeGoals.forEach(g => { homeList.innerHTML += `<div>⚽ ${g}</div>`; });
            awayGoals.forEach(g => { awayList.innerHTML += `<div>${g} ⚽</div>`; });
        }

        function handleSummaryAnimationLogic() {
            const targetMode = currentMatchState.summary_mode || "NONE";
            if (targetMode === currentDisplayedSummary) return;
            
            const container = document.getElementById('summary-board-container');
            const titleEl = document.getElementById('summary-board-title');
            
            if (targetMode === "HALFTIME" || targetMode === "FULLTIME") {
                titleEl.innerText = targetMode === "HALFTIME" ? "HALFTIME MATCH SUMMARY" : "FINAL MATCH SUMMARY";
                currentDisplayedSummary = targetMode;
                
                gsap.killTweensOf(container);
                gsap.set(container, { visibility: 'visible', yPercent: 30, xPercent: -50, opacity: 0, scale: 0.95 });
                gsap.to(container, { yPercent: -50, xPercent: -50, opacity: 1, scale: 1, duration: 0.6, ease: "power3.out" });
            } else {
                currentDisplayedSummary = "NONE";
                gsap.killTweensOf(container);
                gsap.to(container, { yPercent: 30, xPercent: -50, opacity: 0, scale: 0.95, duration: 0.5, ease: "power3.in", onComplete: () => {
                    gsap.set(container, { visibility: 'hidden' });
                }});
            }
        }

        function triggerGoalLiveAnimation() {
            animatedGoalTrigger = true;
            const container = document.getElementById('goal-live-container');
            
            document.getElementById('goal-popup-player-name').innerText = currentMatchState.scorer_name;
            const teamName = currentMatchState.scorer_team === 'home' ? currentMatchState.home_name : currentMatchState.away_name;
            document.getElementById('goal-popup-team-name').innerText = teamName;
            
            gsap.killTweensOf(container);
            gsap.set(container, { visibility: 'visible', y: -50, opacity: 0, scale: 0.9 });
            
            gsap.to(container, { y: 0, opacity: 1, scale: 1, duration: 0.5, ease: "power3.out" });
            
            setTimeout(() => {
                gsap.to(container, { y: -30, opacity: 0, scale: 0.9, duration: 0.5, ease: "power3.in", onComplete: async () => {
                    gsap.set(container, { visibility: 'hidden' });
                    animatedGoalTrigger = false;
                    if (typeof supabaseClient !== 'undefined' && supabaseClient) {
                        currentMatchState.show_goal_trigger = false;
                        await pushState();
                    }
                }});
            }, 6000);
        }

        function triggerSubLiveAnimation() {
            animatedSubTrigger = true;
            const container = document.getElementById('sub-live-container');
            
            document.getElementById('sub-player-out-name').innerText = currentMatchState.sub_out || "ZAWODNIK";
            document.getElementById('sub-player-in-name').innerText = currentMatchState.sub_in || "ZAWODNIK";
            
            gsap.killTweensOf(container);
            gsap.set(container, { visibility: 'visible', y: 50, opacity: 0 });
            gsap.to(container, { y: 0, opacity: 1, duration: 0.5, ease: "power3.out" });
        }

        function hideSubLiveAnimation() {
            animatedSubTrigger = false;
            const container = document.getElementById('sub-live-container');
            gsap.killTweensOf(container);
            gsap.to(container, { y: 50, opacity: 0, duration: 0.5, ease: "power3.in", onComplete: () => {
                gsap.set(container, { visibility: 'hidden' });
            }});
        }
    </script>
</body>
</html>
