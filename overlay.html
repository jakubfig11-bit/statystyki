<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>OVERLAY SCOREBOARD v3 - FIXED</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="style-v3.css">
    <style>
        /* GŁÓWNE PARAMETRY EKRANU OBS */
        html, body {
            margin: 0;
            padding: 0;
            background: transparent !important;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            width: 1920px;
            height: 1080px;
        }

        /* HUB GŁÓWNY - SZTYWNA STRUKTURA I IDEALNA SYMETRIA */
        .hud-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            background: #141821;
            border: 2px solid #2d3748;
            border-radius: 6px;
            width: 650px;
            height: 65px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            box-sizing: border-box;
            padding: 0;
        }

        /* Drużyny zajmują równo po 40% szerokości paska */
        .hud-team-left {
            width: 40%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 20px;
            font-weight: 800;
            color: #ffffff;
            font-size: 18px;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .hud-team-right {
            width: 40%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 20px;
            font-weight: 800;
            color: #ffffff;
            font-size: 18px;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .hud-logo {
            width: 28px;
            height: 28px;
            object-fit: contain;
            display: none;
        }

        /* Środkowy boks (Dokładnie 20% szerokości) - Bez ucinania tekstu */
        .hud-center-score-block {
            width: 20%;
            height: 55px;
            background: #0b0e14;
            border: 1px solid #2d3748;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        .score-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: monospace;
            font-size: 24px;
            font-weight: 900;
            color: #ffffff;
            line-height: 1;
        }
        .score-divider {
            color: #4a5568;
        }
        .time-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 3px;
        }
        #hud-timer {
            color: #00ffaa;
            font-family: monospace;
            font-size: 13px;
            font-weight: bold;
        }
        #hud-period {
            font-size: 9px;
            color: #a0aec0;
            background: #2d3748;
            padding: 1px 4px;
            border-radius: 2px;
            font-weight: bold;
        }

        /* SKŁADY - PANEL CENTRALNY */
        #lineups-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            background: rgba(10, 14, 23, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
        }
        .lineup-tv-center-block {
            width: 1150px;
            height: 650px;
            background: #161a24;
            border: 3px solid #2d3748;
            border-radius: 16px;
            display: flex;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            overflow: hidden;
        }
        .lineup-pitch-side {
            flex: 1.2;
            background: #1a1f2c;
            position: relative;
            padding: 25px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .pitch-outline {
            width: 100%;
            height: 100%;
            max-width: 480px;
            border: 2px solid #3f4e66;
            border-radius: 8px;
            position: relative;
            box-sizing: border-box;
        }
        .pitch-center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 130px;
            height: 130px;
            border: 2px solid #3f4e66;
            border-radius: 50%;
        }
        .pitch-center-line {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: #3f4e66;
        }
        .pitch-penalty-box-top {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 240px;
            height: 90px;
            border: 2px solid #3f4e66;
            border-top: none;
        }
        .pitch-penalty-box-bottom {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 240px;
            height: 90px;
            border: 2px solid #3f4e66;
            border-bottom: none;
        }

        /* KULKI ZAWODNIKÓW - PEŁNE ZABEZPIECZENIE GEOMETRII */
        .player-node {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: translate(-50%, -50%);
            z-index: 5;
        }
        .player-shirt {
            width: 48px;
            height: 48px;
            min-width: 48px;
            min-height: 48px;
            aspect-ratio: 1 / 1 !important;
            background: #ff0055;
            border: 3px solid #ffffff;
            border-radius: 50% !important;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 14px rgba(0,0,0,0.6);
            box-sizing: border-box;
        }
        .p-num {
            font-size: 18px;
            font-weight: 900;
            color: #ffffff;
            line-height: 1;
        }
        .p-name {
            background: rgba(10, 14, 23, 0.95);
            color: #ffffff;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-top: 6px;
            text-transform: uppercase;
            border: 1px solid #2d3748;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }

        /* Pozycje bazowe dla formacji maksymalnej (1-2-2).
           Jeśli app.js generuje strukturę dynamicznie, te klasy posłużą jako punkty zaczepienia */
        .pos-gk    { top: 86%; left: 50%; }
        .pos-df-l  { top: 60%; left: 25%; }
        .pos-df-r  { top: 60%; left: 75%; }
        .pos-fw-l  { top: 26%; left: 25%; }
        .pos-fw-r  { top: 26%; left: 75%; }

        /* PANEL INFO (PRAWA STRONA) */
        .lineup-info-side {
            flex: 1;
            background: #11141a;
            border-left: 2px solid #2d3748;
            padding: 35px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        .lineup-team-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        .lineup-logo-large {
            width: 50px;
            height: 50px;
            object-fit: contain;
            display: none;
        }
        #lineup-team-title {
            font-size: 32px;
            font-weight: 900;
            color: #ffffff;
            margin: 0;
            text-transform: uppercase;
        }
        .lineup-sub-title {
            font-size: 11px;
            color: #a0aec0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .bench-section {
            margin-top: 10px;
            flex: 1;
        }
        .bench-section h4 {
            color: #a0aec0;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 12px;
            border-bottom: 1px solid #2d3748;
            padding-bottom: 4px;
        }
        #lineup-bench-list {
            padding: 0;
            margin: 0;
            list-style: none;
        }
        .coach-section {
            margin-top: auto;
            background: #161a24;
            padding: 12px 15px;
            border-radius: 6px;
            border: 1px solid #2d3748;
        }
        .coach-section label {
            display: block;
            font-size: 10px;
            color: #a0aec0;
            text-transform: uppercase;
            margin-bottom: 3px;
        }
        #lineup-coach-display {
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            text-transform: uppercase;
        }

        /* ANONS BRAMKI (GOAL POPUP) - DOSTOSOWANY POD KLIK */
        #goal-badge-container {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            background: rgba(18, 22, 33, 0.95);
            border: 2px solid #2d3748;
            border-radius: 8px;
            padding: 15px 25px;
            width: 550px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            z-index: 999;
            box-sizing: border-box;
        }
        #goal-badge-accent {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 6px;
            border-top-left-radius: 6px;
            border-bottom-left-radius: 6px;
            background-color: #ff0055;
        }
        .goal-meta-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2px;
        }
        .goal-string {
            color: #ffffff !important;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        #goal-badge-team {
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #ff0055;
        }
        #goal-badge-scorer {
            font-size: 28px;
            font-weight: 900;
            color: #ffffff !important;
            text-transform: uppercase;
            margin-top: 4px;
        }
        #goal-badge-time {
            font-size: 24px;
            font-weight: bold;
            color: #a0aec0;
            font-family: monospace;
            padding-left: 25px;
            border-left: 1px solid #2d3748;
            margin-left: auto;
        }

        /* STATYSTYKI INDYWIDUALNE */
        #stat-badge-container {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            background: rgba(18, 22, 33, 0.95);
            border: 2px solid #2d3748;
            border-radius: 8px;
            padding: 12px 25px;
            min-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            z-index: 90;
            visibility: hidden;
        }
    </style>
</head>
<body>

    <div class="hud-container">
        <div class="hud-team-left">
            <img id="hud-home-logo" class="hud-logo" src="" alt="L">
            <span id="hud-home-name">TORINO</span>
        </div>
        
        <div class="hud-center-score-block">
            <div class="score-row">
                <span id="hud-home-score">0</span>
                <span class="score-divider">:</span>
                <span id="hud-away-score">0</span>
            </div>
            <div class="time-row">
                <span id="hud-timer">00:00</span>
                <span id="hud-period">1H</span>
            </div>
        </div>

        <div class="hud-team-right">
            <span id="hud-away-name">ELCHE</span>
            <img id="hud-away-logo" class="hud-logo" src="" alt="R">
        </div>
    </div>

    <div id="lineups-overlay">
        <div class="lineup-tv-center-block">
            <div class="lineup-pitch-side">
                <div class="pitch-outline" id="pitch-border-line">
                    <div class="pitch-center-line"></div>
                    <div class="pitch-center-circle"></div>
                    <div class="pitch-penalty-box-top"></div>
                    <div class="pitch-penalty-box-bottom"></div>
                    
                    <div id="pitch-players-container">
                        <div class="player-node pos-gk">
                            <div class="player-shirt"><span class="p-num">-</span></div>
                            <div class="p-name">-</div>
                        </div>
                        <div class="player-node pos-df-l">
                            <div class="player-shirt"><span class="p-num">-</span></div>
                            <div class="p-name">-</div>
                        </div>
                        <div class="player-node pos-df-r">
                            <div class="player-shirt"><span class="p-num">-</span></div>
                            <div class="p-name">-</div>
                        </div>
                        <div class="player-node pos-fw-l">
                            <div class="player-shirt"><span class="p-num">-</span></div>
                            <div class="p-name">-</div>
                        </div>
                        <div class="player-node pos-fw-r">
                            <div class="player-shirt"><span class="p-num">-</span></div>
                            <div class="p-name">-</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="lineup-info-side">
                <div class="lineup-team-header">
                    <img id="lineup-team-logo" class="lineup-logo-large" src="" alt="Logo">
                    <div>
                        <h3 id="lineup-team-title">DRUŻYNA</h3>
                        <div class="lineup-sub-title">SKŁAD WYJŚCIOWY</div>
                    </div>
                </div>
                
                <div class="bench-section">
                    <h4>ŁAWKA REZERWOWYCH</h4>
                    <ul id="lineup-bench-list"></ul>
                </div>
                
                <div class="coach-section">
                    <label>TRENER</label>
                    <div id="lineup-coach-display">BRAK TRENERA</div>
                </div>
            </div>
        </div>
    </div>

    <div id="goal-badge-container" style="visibility: hidden;">
        <div id="goal-badge-accent"></div>
        <div style="display: flex; flex-direction: column;">
            <div class="goal-meta-row">
                <span class="goal-string">STRZELONY GOL!</span>
                <span style="color: #ffffff; font-size: 13px;">⚽</span>
            </div>
            <div id="goal-badge-team">GOSPODARZE</div>
            <div id="goal-badge-scorer">ZAWODNIK</div>
        </div>
        <div id="goal-badge-time">00:00</div>
    </div>

    <div id="stat-badge-container">
        <div id="stat-badge-accent"></div>
        <div class="stat-text-block">
            <div id="stat-badge-player-name">ZAWODNIK</div>
            <div id="stat-badge-category">STRZAŁY NA BRAMKĘ</div>
        </div>
        <div id="stat-badge-value">0</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
