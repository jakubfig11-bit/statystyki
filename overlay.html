<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoreboard Overlay</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="overlay-body">
    
    <div id="scoreboard" class="hud-container">
        <div class="hud-side hud-home">
            <img id="hud-home-logo" class="hud-team-logo" style="display: none;">
            <span id="hud-home-name" class="hud-team-name">GOSPODARZE</span>
            <span id="hud-home-score" class="hud-score">0</span>
        </div>
        <div class="hud-center">
            <span id="hud-timer" class="hud-time">00:00</span>
            <span id="hud-period" class="hud-part">1H</span>
        </div>
        <div class="hud-side hud-away">
            <span id="hud-away-score" class="hud-score">0</span>
            <span id="hud-away-name" class="hud-team-name">GOŚCIE</span>
            <img id="hud-away-logo" class="hud-team-logo" style="display: none;">
        </div>
    </div>

    <div id="goal-badge-container" class="goal-badge-wrapper" style="visibility: hidden;">
        <div id="goal-badge-accent" class="goal-badge-club-stripe"></div>
        <div class="goal-badge-main-content">
            <div class="goal-badge-top-row">
                <span class="goal-badge-alert-text">STRZELONY GOL! ⚽</span>
                <span id="goal-badge-time" class="goal-badge-match-time">00:00</span>
            </div>
            <div class="goal-badge-bottom-row">
                <span id="goal-badge-team" class="goal-badge-team-name">DRUŻYNA</span>
                <span id="goal-badge-scorer" class="goal-badge-player-info">ZAWODNIK</span>
            </div>
        </div>
    </div>

    <div id="lineups-overlay" class="lineup-tv-fullscreen" style="visibility: hidden; opacity: 0;">
        <div class="lineup-tv-center-block">
            
            <div class="tactical-pitch-container">
                <div id="pitch-border-line" class="pitch-field">
                    <div class="pitch-penalty-box top-box"></div>
                    <div class="pitch-center-line">
                        <div class="pitch-center-circle"></div>
                    </div>
                    <div class="pitch-penalty-box bottom-box"></div>
                    
                    <div class="player-node pos-gk">
                        <div class="player-shirt"><span class="p-num">-</span></div>
                        <span class="p-name">Bramkarz</span>
                    </div>
                    <div class="player-node pos-df-l">
                        <div class="player-shirt"><span class="p-num">-</span></div>
                        <span class="p-name">Obrońca L</span>
                    </div>
                    <div class="player-node pos-df-r">
                        <div class="player-shirt"><span class="p-num">-</span></div>
                        <span class="p-name">Obrońca P</span>
                    </div>
                    <div class="player-node pos-fw-l">
                        <div class="player-shirt"><span class="p-num">-</span></div>
                        <span class="p-name">Napastnik L</span>
                    </div>
                    <div class="player-node pos-fw-r">
                        <div class="player-shirt"><span class="p-num">-</span></div>
                        <span class="p-name">Napastnik P</span>
                    </div>
                </div>
            </div>

            <div class="tactical-sidebar">
                <div class="sidebar-header">
                    <img id="lineup-team-logo" class="sidebar-team-logo" style="display: none;">
                    <div>
                        <h1 id="lineup-team-title">NAZWA DRUŻYNY</h1>
                        <p class="sidebar-sub">SKŁAD WYJŚCIOWY</p>
                    </div>
                </div>
                
                <div class="sidebar-section">
                    <h3>ŁAWKA REZERWOWYCH</h3>
                    <ul id="lineup-bench-list" class="bench-list"></ul>
                </div>
                
                <div class="sidebar-section coach-section">
                    <h3>TRENER</h3>
                    <div id="lineup-coach-display" class="coach-box">BRAK</div>
                </div>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
