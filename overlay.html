<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Overlay Meczowy - Wersja Finalna</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; background-color: transparent; }

        /* TABLICA WYNIKÓW (TOP HUD) */
        .hud-container {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #121224;
            border: 2px solid #252547;
            border-radius: 8px;
            height: 60px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            z-index: 10;
        }
        .hud-home, .hud-away { display: flex; align-items: center; gap: 12px; padding: 0 20px; min-width: 240px; height: 100%; }
        .hud-home { justify-content: flex-end; }
        .hud-away { justify-content: flex-start; }
        
        .hud-logo { width: 35px; height: 35px; object-fit: contain; }
        .hud-team-name { font-size: 18px; font-weight: 800; text-transform: uppercase; color: #fff; }
        
        .hud-center {
            display: flex;
            align-items: center;
            background-color: #1a1a3a;
            height: 100%;
            border-left: 2px solid #252547;
            border-right: 2px solid #252547;
            padding: 0 15px;
        }
        .hud-score { font-size: 28px; font-weight: 900; font-family: monospace; color: #00ffaa; width: 70px; text-align: center; }
        .hud-mid-info { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 70px; }
        .hud-timer { font-size: 16px; font-weight: 700; color: #fff; font-family: monospace; }
        .hud-period { font-size: 11px; font-weight: 800; color: #718096; }

        /* =========================================================================
           NOWOŚĆ: MOTION DESIGN - DYNAMICZNA BELKA GOLOWA (WYSUWANA Z DOŁU)
           ========================================================================= */
        #goal-badge-container {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%) translateY(250px); /* Pozycja startowa (schowana w dół) */
            width: 580px;
            height: 95px;
            background: rgba(14, 14, 28, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            overflow: hidden;
            z-index: 999;
            visibility: hidden; /* Kontrolowane przez GSAP */
        }

        /* Dynamiczny pasek akcentujący po lewej stronie z kolorem drużyny */
        #goal-badge-accent {
            width: 12px;
            height: 100%;
            background-color: #ff0055; /* Zmieniane dynamicznie przez JS */
            flex-shrink: 0;
        }

        /* Kontener na Logo Drużyny wewnątrz grafiki bramkowej */
        .goal-badge-logo-box {
            width: 85px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px;
        }
        #goal-badge-logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Główna zawartość tekstowa */
        .goal-badge-main-content {
            flex: 1;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .goal-badge-top-row {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 2px;
        }

        .goal-badge-alert {
            font-size: 22px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00ffaa;
            animation: pulse-glow 1.5s infinite alternate;
        }

        #goal-badge-team {
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            color: #ff0055; /* Zmieniane dynamicznie przez JS */
        }

        #goal-badge-scorer {
            font-size: 24px;
            font-weight: 800;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Sekcja czasu po prawej stronie */
        .goal-badge-time-box {
            padding: 0 25px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
        }

        .goal-badge-time-label {
            font-size: 9px;
            font-weight: 700;
            color: #718096;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #goal-badge-time {
            font-size: 24px;
            font-weight: 900;
            color: #fff;
            font-family: monospace;
        }

        @keyframes pulse-glow {
            from { text-shadow: 0 0 5px rgba(0, 255, 170, 0.2); }
            to { text-shadow: 0 0 15px rgba(0, 255, 170, 0.6); }
        }

        /* PANEL STATYSTYK (STARY ELEMENT SYSTEMU) */
        #stat-badge-container {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%) translateY(250px);
            width: 450px;
            height: 80px;
            background: rgba(14, 14, 28, 0.95);
            border-radius: 8px;
            border: 1px solid #252547;
            display: flex;
            align-items: center;
            overflow: hidden;
            z-index: 998;
            visibility: hidden;
        }
        #stat-badge-accent { width: 8px; height: 100%; background: #00ffaa; }
        .stat-main { flex: 1; padding: 0 15px; }
        #stat-badge-player-name { font-size: 18px; font-weight: 800; color: #fff; text-transform: uppercase; }
        #stat-badge-category { font-size: 12px; font-weight: 700; color: #a0aec0; text-transform: uppercase; }
        #stat-badge-value { font-size: 32px; font-weight: 900; padding: 0 20px; font-family: monospace; }

        /* SKŁADY (CENTRALNY PANEL TV) */
        #lineups-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 12, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            visibility: hidden;
            opacity: 0;
        }
        .lineup-tv-center-block {
            width: 1100px;
            height: 650px;
            background: #101024;
            border: 3px solid #252547;
            border-radius: 16px;
            display: flex;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            overflow: hidden;
        }
        .pitch-visualizer { flex: 1.3; position: relative; background: #14142b; padding: 30px; display: flex; align-items: center; justify-content: center; }
        .pitch-mock { width: 100%; height: 100%; border: 2px dashed rgba(255,255,255,0.1); position: relative; border-radius: 8px; }
        .player-node { position: absolute; display: flex; flex-direction: column; align-items: center; gap: 6px; transform: translate(-50%, -50%); }
        .player-shirt { width: 46px; height: 46px; background: #ff0055; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        .p-name { background: rgba(0,0,0,0.7); padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 700; color: #fff; text-transform: uppercase; white-space: nowrap; }
        
        .pos-gk { top: 85%; left: 50%; }
        .pos-df-l { top: 60%; left: 25%; }
        .pos-df-r { top: 60%; left: 75%; }
        .pos-fw-l { top: 30%; left: 30%; }
        .pos-fw-r { top: 30%; left: 70%; }

        .tactical-sidebar { flex: 1; background: #0b0b14; padding: 40px; display: flex; flex-direction: column; border-left: 2px solid #252547; }
        .sidebar-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .sidebar-team-logo { width: 55px; height: 55px; object-fit: contain; }
        #lineup-team-title { font-size: 28px; font-weight: 900; text-transform: uppercase; }
        .sidebar-section h3 { font-size: 13px; color: #718096; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        #lineup-bench-list { font-size: 15px; line-height: 1.6; }
        #lineup-coach-display { font-size: 16px; font-weight: 700; color: #fff; padding-left: 8px; }
    </style>
</head>
<body>

    <div class="hud-container">
        <div class="hud-home">
            <span class="hud-team-name" id="hud-home-name">TORINO</span>
            <img class="hud-logo" id="hud-home-logo" src="" alt="" style="display:none;">
        </div>
        <div class="hud-center">
            <div class="hud-score" id="hud-home-score">0</div>
            <div class="hud-mid-info">
                <div class="hud-timer" id="hud-timer">00:00</div>
                <div class="hud-period" id="hud-period">1H</div>
            </div>
            <div class="hud-score" id="hud-away-score">0</div>
        </div>
        <div class="hud-away">
            <img class="hud-logo" id="hud-away-logo" src="" alt="" style="display:none;">
            <span class="hud-team-name" id="hud-away-name">ELCHE</span>
        </div>
    </div>

    <div id="goal-badge-container">
        <div id="goal-badge-accent"></div>
        <div class="goal-badge-logo-box">
            <img id="goal-badge-logo-img" src="" alt="" style="display: none;">
        </div>
        <div class="goal-badge-main-content">
            <div class="goal-badge-top-row">
                <span class="goal-badge-alert">GOL!</span>
                <span id="goal-badge-team">Klub</span>
            </div>
            <div id="goal-badge-scorer">9. Zawodnik</div>
        </div>
        <div class="goal-badge-time-box">
            <span class="goal-badge-time-label">Minuta</span>
            <div id="goal-badge-time">00:00</div>
        </div>
    </div>

    <div id="stat-badge-container">
        <div id="stat-badge-accent"></div>
        <div class="stat-main">
            <div id="stat-badge-player-name">Zawodnik</div>
            <div id="stat-badge-category">Punkty</div>
        </div>
        <div id="stat-badge-value">1</div>
    </div>

    <div id="lineups-overlay">
        <div class="lineup-tv-center-block">
            <div class="pitch-visualizer">
                <div class="pitch-mock" id="pitch-border-line">
                    <div class="player-node pos-gk" id="p1"><div class="player-shirt"><span class="p-num">1</span></div><span class="p-name">Bramkarz</span></div>
                    <div class="player-node pos-df-l" id="p2"><div class="player-shirt"><span class="p-num">2</span></div><span class="p-name">Obrońca L</span></div>
                    <div class="player-node pos-df-r" id="p3"><div class="player-shirt"><span class="p-num">3</span></div><span class="p-name">Obrońca P</span></div>
                    <div class="player-node pos-fw-l" id="p4"><div class="player-shirt"><span class="p-num">4</span></div><span class="p-name">Napastnik L</span></div>
                    <div class="player-node pos-fw-r" id="p5"><div class="player-shirt"><span class="p-num">5</span></div><span class="p-name">Napastnik P</span></div>
                </div>
            </div>
            <div class="tactical-sidebar">
                <div class="sidebar-header">
                    <img class="sidebar-team-logo" id="lineup-team-logo" src="" alt="" style="display:none;">
                    <h1 id="lineup-team-title">TEAM NAME</h1>
                </div>
                <div class="sidebar-section" style="flex:1;">
                    <h3>Zawodnicy Rezerwowi</h3>
                    <ul id="lineup-bench-list"></ul>
                </div>
                <div class="sidebar-section">
                    <h3>Główny Trener</h3>
                    <div id="lineup-coach-display">Trener</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
