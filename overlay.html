<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay Meczowy</title>
    <!-- Czcionka Inter dla nowoczesnego, sportowego wyglądu -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            width: 1920px;
            height: 1080px;
            background-color: transparent;
            overflow: hidden;
            position: relative;
        }

        .hidden {
            display: none !important;
        }

        /* ==========================================
           1. HUD (GÓRNY CZYTNIK WYNIKU)
           ========================================== */
        #hud-overlay {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            background: #0f111a;
            border: 2px solid #1f2335;
            border-radius: 8px;
            padding: 8px 16px;
            color: white;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .hud-team {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 1px;
        }

        .hud-logo {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .hud-accent {
            width: 6px;
            height: 24px;
            border-radius: 3px;
        }

        .hud-score-container {
            display: flex;
            align-items: center;
            background: #161925;
            padding: 4px 16px;
            margin: 0 15px;
            border-radius: 6px;
            gap: 12px;
            font-size: 22px;
            font-weight: 900;
        }

        #hud-timer {
            color: #ff9e3b;
            font-variant-numeric: tabular-nums;
        }

        /* ==========================================
           2. ANIMACJA BRAMKI (GOAL OVERLAY)
           ========================================== */
        #goal-overlay {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            background: #0f111a;
            border: 3px solid #1f2335;
            border-radius: 12px;
            padding: 20px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 16px 40px rgba(0,0,0,0.7);
            visibility: hidden;
            z-index: 20;
            overflow: hidden;
        }

        #goal-card-accent {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            border-top: 5px solid #0052cc;
        }

        #goal-bg-logo {
            position: absolute;
            right: -20px;
            bottom: -20px;
            width: 150px;
            height: 150px;
            opacity: 0.08;
            pointer-events: none;
        }

        #goal-time {
            font-size: 14px;
            color: #ff9e3b;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        #goal-scorer {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -0.5px;
            margin-bottom: 2px;
            text-align: center;
        }

        #goal-team {
            font-size: 16px;
            color: #a9b1d6;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* ==========================================
           3. ZMIANA ZAWODNIKA (SUB OVERLAY)
           ========================================== */
        #sub-overlay {
            position: absolute;
            bottom: 100px;
            right: 50px;
            width: 400px;
            background: #0f111a;
            border-radius: 8px;
            border: 1px solid #1f2335;
            padding: 16px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            visibility: hidden;
            z-index: 20;
        }

        #sub-card-accent {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 6px;
            border-top-left-radius: 8px;
            border-bottom-left-radius: 8px;
        }

        #sub-team-name {
            font-size: 12px;
            font-weight: 800;
            color: #7aa2f7;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        .sub-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
            font-size: 16px;
            font-weight: 700;
        }

        .sub-row:last-child { margin-bottom: 0; }
        .sub-icon { font-size: 14px; }
        .sub-out-ico { color: #ff0044; }
        .sub-in-ico { color: #00ff66; }

        /* ==========================================
           4. SKŁADY TAKTYCZNE (LINEUPS)
           ========================================== */
        #tactical-lineups-overlay {
            position: absolute;
            top: 150px;
            left: 50%;
            transform: translateX(-50%);
            width: 650px;
            background: rgba(15, 17, 26, 0.95);
            border: 2px solid #1f2335;
            border-radius: 16px;
            padding: 30px;
            color: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            visibility: hidden;
            z-index: 15;
            backdrop-filter: blur(10px);
        }

        .tactical-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #1f2335;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        #tactical-team-name { font-size: 24px; font-weight: 900; letter-spacing: 1px; }
        #tactical-top-logo { width: 45px; height: 45px; object-fit: contain; }

        .player-row {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .player-number {
            background: #161925;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-weight: 800;
            color: #ff9e3b;
        }

        .player-name { font-weight: 700; font-size: 18px; }
        #tactical-coach-name { margin-top: 15px; font-size: 14px; font-weight: 800; color: #a9b1d6; }
        #tactical-subs-list { margin-top: 5px; font-size: 13px; color: #787c99; line-height: 1.4; }

        /* ==========================================
           5. STATYSTYKI INDYWIDUALNE (PLAYER STATS)
           ========================================== */
        #player-stats-overlay {
            position: absolute;
            top: 200px;
            left: 50px;
            width: 380px;
            background: #0f111a;
            border: 1px solid #1f2335;
            border-radius: 12px;
            padding: 20px;
            color: white;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            visibility: hidden;
            z-index: 15;
        }

        #stats-player-accent { height: 4px; width: 60px; margin-bottom: 12px; border-radius: 2px; }
        #stats-player-name { font-size: 22px; font-weight: 900; margin-bottom: 15px; }

        .stat-line {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 15px;
            font-weight: 600;
        }

        .stat-line span:last-child { font-weight: 800; color: #ff9e3b; }

        /* ==========================================
           6. PODSUMOWANIE MECZU (MATCH SUMMARY BOARD)
              Zgodne z wizualizacją image_30c002.png
           ========================================== */
        #summary-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            background: #0f121d;
            border: 1px solid #1e2235;
            border-radius: 16px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            color: white;
            visibility: hidden;
            z-index: 30;
            overflow: hidden;
        }

        .summary-header {
            width: 100%;
            text-align: center;
            padding: 20px 0;
            background: #131726;
            border-bottom: 1px solid #1e2235;
        }

        #summary-txt-title {
            font-size: 16px;
            font-weight: 900;
            color: #ffac33;
            letter-spacing: 2px;
        }

        .summary-score-board {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 40px 60px;
        }

        .summary-team-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 200px;
        }

        .summary-logo {
            width: 70px;
            height: 70px;
            object-fit: contain;
            margin-bottom: 12px;
        }

        .summary-team-name {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 1px;
            text-align: center;
        }

        .summary-center-score {
            background: #171c30;
            padding: 15px 40px;
            border-radius: 12px;
            font-size: 54px;
            font-weight: 900;
            letter-spacing: 2px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        /* Sekcja listy strzelców */
        .summary-scorers-box {
            display: flex;
            padding: 0 40px 40px 40px;
            gap: 40px;
        }

        .summary-scorers-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 50px;
        }

        #summary-scorers-list-home { align-items: flex-end; text-align: right; }
        #summary-scorers-list-away { align-items: flex-start; text-align: left; }

        .summary-scorer-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 700;
            color: #e1e4ea;
            margin-bottom: 6px;
        }

        .summary-scorer-row .minute {
            color: #ffac33;
            font-weight: 800;
        }

        /* Dolne paski akcentowe */
        .summary-footer-accents {
            display: flex;
            height: 8px;
            width: 100%;
        }

        .summary-accent-bar { flex: 1; }

        /* NOWA DEDYKOWANA PRZEGRODA POŁÓWEK MECZU */
        .summary-half-divider {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 11px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 3px;
            margin: 14px 0;
            padding: 4px 0;
            border-top: 1px dashed rgba(255, 255, 255, 0.12);
            border-bottom: 1px dashed rgba(255, 255, 255, 0.12);
            text-transform: uppercase;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <!-- 1. HUD OVERLAY -->
    <div id="hud-overlay">
        <div class="hud-team">
            <div id="hud-home-accent" class="hud-accent"></div>
            <img id="hud-home-logo" class="hud-logo hidden" src="" alt="Home Logo">
            <span id="hud-home-name">HOME</span>
        </div>
        <div class="hud-score-container">
            <span id="hud-home-score">0</span>
            <span id="hud-timer">00:00</span>
            <span id="hud-away-score">0</span>
        </div>
        <div class="hud-team">
            <span id="hud-away-name">AWAY</span>
            <img id="hud-away-logo" class="hud-logo hidden" src="" alt="Away Logo">
            <div id="hud-away-accent" class="hud-accent"></div>
        </div>
    </div>

    <!-- 2. GOAL ANIMATION OVERLAY -->
    <div id="goal-overlay">
        <div id="goal-card-accent"></div>
        <img id="goal-bg-logo" class="hidden" src="" alt="BG Logo">
        <div id="goal-time">00:00 - BRAMKA</div>
        <div id="goal-scorer">STRZELEC BRAMKI</div>
        <div id="goal-team">DRUŻYNA</div>
    </div>

    <!-- 3. SUB ANIMATION OVERLAY -->
    <div id="sub-overlay">
        <div id="sub-card-accent"></div>
        <div id="sub-team-name">DRUŻYNA</div>
        <div class="sub-row">
            <span class="sub-icon sub-out-ico">▼</span>
            <span id="sub-txt-out">SCHODZI</span>
        </div>
        <div class="sub-row">
            <span class="sub-icon sub-in-ico">▲</span>
            <span id="sub-txt-in">WCHODZI</span>
        </div>
    </div>

    <!-- 4. TACTICAL LINEUPS OVERLAY -->
    <div id="tactical-lineups-overlay">
        <div class="tactical-header">
            <span id="tactical-team-name">SKŁAD DRUŻYNY</span>
            <img id="tactical-top-logo" class="hidden" src="" alt="Team Logo">
        </div>
        
        <div id="tactical-players-container">
            <div class="player-row" id="tactical-p1"><span class="player-number">0</span><span class="player-name">ZAWODNIK</span></div>
            <div class="player-row" id="tactical-p2"><span class="player-number">0</span><span class="player-name">ZAWODNIK</span></div>
            <div class="player-row" id="tactical-p3"><span class="player-number">0</span><span class="player-name">ZAWODNIK</span></div>
            <div class="player-row" id="tactical-p4"><span class="player-number">0</span><span class="player-name">ZAWODNIK</span></div>
            <div class="player-row" id="tactical-p5"><span class="player-number">0</span><span class="player-name">ZAWODNIK</span></div>
        </div>

        <div id="tactical-coach-name">TRENER: -</div>
        <div id="tactical-subs-list">Rezerwowi: brak informacji</div>
    </div>

    <!-- 5. PLAYER STATS OVERLAY -->
    <div id="player-stats-overlay">
        <div id="stats-player-accent"></div>
        <div id="stats-player-name">ZAWODNIK</div>
        <div class="stat-line"><span>Strzały</span><span id="stat-val-shots">0</span></div>
        <div class="stat-line"><span>Podania</span><span id="stat-val-passes">0</span></div>
        <div class="stat-line"><span>Gole</span><span id="stat-val-goals">0</span></div>
        <div class="stat-line"><span>Asysty</span><span id="stat-val-assists">0</span></div>
    </div>

    <!-- 6. MATCH SUMMARY OVERLAY -->
    <div id="summary-overlay">
        <div class="summary-header">
            <div id="summary-txt-title">MATCH SUMMARY</div>
        </div>
        
        <div class="summary-score-board">
            <div class="summary-team-column">
                <img id="summary-board-logo-home" class="summary-logo hidden" src="" alt="Home Logo">
                <div id="summary-board-name-home" class="summary-team-name">HOME</div>
            </div>
            
            <div id="summary-board-score-container" class="summary-center-score">
                <span id="summary-board-score-home">0</span> - <span id="summary-board-score-away">0</span>
            </div>
            
            <div class="summary-team-column">
                <img id="summary-board-logo-away" class="summary-logo hidden" src="" alt="Away Logo">
                <div id="summary-board-name-away" class="summary-team-name">AWAY</div>
            </div>
        </div>

        <!-- Przestrzeń na strzelców bramek z logiką podziału -->
        <div class="summary-scorers-box">
            <div id="summary-scorers-list-home" class="summary-scorers-side"></div>
            <div id="summary-scorers-list-away" class="summary-scorers-side"></div>
        </div>

        <!-- Kolorowe paski podsumowania na samym dole -->
        <div class="summary-footer-accents">
            <div id="summary-footer-accent-home" class="summary-accent-bar" style="background-color: #0052cc;"></div>
            <div id="summary-footer-accent-away" class="summary-accent-bar" style="background-color: #ff0044;"></div>
        </div>
    </div>

    <!-- Zewnętrzne silniki skryptowe (Wymagane przez app.js) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Twój plik logiki systemowej -->
    <script src="app.js"></script>
    <script>
        // Inicjalizacja widoku Overlay zaraz po załadowaniu drzewa DOM
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof initOverlayView === "function") {
                initOverlayView();
            }
        });
    </script>
</body>
</html>
