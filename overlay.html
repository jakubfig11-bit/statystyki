<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay Meczowy - Fixed</title>
    <style>
        /* ==========================================
           1. RESET I USTAWIENIA DIZSAJNU (STABILNE)
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            background-color: transparent; /* Przezroczyste dla OBS */
        }

        /* ==========================================
           2. POPRAWIONY SCOREBOARD (STARY STABILNY UKŁAD)
           ========================================== */
        .hud-container {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #121224;
            border: 2px solid #252547;
            border-radius: 8px;
            height: 60px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            z-index: 10;
            overflow: hidden;
        }

        .hud-home {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            width: 250px;
            height: 100%;
            padding-right: 20px;
        }

        .hud-away {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            width: 250px;
            height: 100%;
            padding-left: 20px;
        }

        .hud-center {
            background-color: #090915;
            border-left: 2px solid #252547;
            border-right: 2px solid #252547;
            height: 100%;
            width: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .hud-team-name {
            font-size: 18px;
            font-weight: 800;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .hud-team-logo {
            width: 34px;
            height: 34px;
            object-fit: contain;
            margin: 0 12px;
            flex-shrink: 0;
        }

        .hud-score {
            font-size: 24px;
            font-weight: 900;
            color: #ffffff;
            line-height: 1;
            letter-spacing: 1px;
        }

        .hud-time {
            font-family: monospace;
            font-size: 16px;
            font-weight: 700;
            color: #00f2fe;
            line-height: 1.2;
            margin-top: 2px;
        }

        .hud-part {
            font-size: 10px;
            font-weight: 800;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ==========================================
           3. SYSTEM STATYSTYK TV XL (NAPRAWIONY)
           ========================================== */
        .stat-badge-xl-wrapper {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 680px; 
            height: 85px;
            background: linear-gradient(135deg, #121229 0%, #080816 100%);
            border: 2px solid #252547;
            border-radius: 8px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
            z-index: 100;
            transition: opacity 0.3s ease, transform 0.3s ease;
            opacity: 0;
            visibility: hidden;
        }

        .stat-badge-xl-stripe {
            width: 12px;
            height: 100%;
            background: linear-gradient(to bottom, #00f2fe, #4facfe);
            flex-shrink: 0;
        }

        .stat-badge-xl-content {
            flex: 1;
            display: flex;
            padding: 0 0 0 25px;
            align-items: center;
            justify-content: space-between;
            height: 100%;
        }

        .stat-badge-xl-left {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
        }

        .stat-badge-xl-title {
            font-size: 11px;
            font-weight: 900;
            color: #00f2fe; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .stat-badge-xl-player {
            font-size: 22px;
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-badge-xl-right {
            display: flex;
            align-items: center;
            height: 100%;
        }

        .stat-badge-xl-val {
            font-size: 42px;
            font-weight: 900;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.07);
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 30px;
            min-width: 95px;
            border-left: 2px solid #252547;
        }

        /* ==========================================
           4. DOLNA BELKA GOLA
           ========================================== */
        .goal-badge-wrapper {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%) translateY(150px);
            width: 620px;
            height: 100px;
            background: linear-gradient(135deg, #06060f 0%, #121220 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
            z-index: 101;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            visibility: hidden;
        }

        .goal-badge-club-stripe {
            width: 12px;
            height: 100%;
            background-color: #ff0055;
        }

        .goal-badge-main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 14px 24px;
            justify-content: center;
        }

        .goal-badge-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .goal-badge-alert-text {
            font-size: 12px;
            font-weight: 800;
            color: #ff0055;
            letter-spacing: 3px;
        }

        .goal-badge-match-time {
            font-size: 14px;
            font-weight: 800;
            color: #a0aec0;
        }

        .goal-badge-bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .goal-badge-team-name {
            font-size: 24px;
            font-weight: 900;
            color: #ff0055;
        }

        .goal-badge-player-info {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="hud-container">
        <div class="hud-home">
            <span id="home-name" class="hud-team-name">GOSPODARZE</span>
            <img id="home-logo" class="hud-team-logo" src="" alt="" style="display: none;">
        </div>
        
        <div class="hud-center">
            <div id="hud-score" class="hud-score">0 - 0</div>
            <div id="hud-time" class="hud-time">00:00</div>
            <div id="hud-part" class="hud-part">1H</div>
        </div>
        
        <div class="hud-away">
            <img id="away-logo" class="hud-team-logo" src="" alt="" style="display: none;">
            <span id="away-name" class="hud-team-name">GOŚCIE</span>
        </div>
    </div>

    <div id="stat-badge" class="stat-badge-xl-wrapper">
        <div class="stat-badge-xl-stripe"></div>
        <div class="stat-badge-xl-content">
            <div class="stat-badge-xl-left">
                <div id="stat-main-title" class="stat-badge-xl-title">STATYSTYKI INDYWIDUALNE ZAWODNIKA</div>
                <div id="stat-title" class="stat-badge-xl-player">NAZWISKO / ZAWODNIK</div>
            </div>
            <div class="stat-badge-xl-right">
                <div id="stat-value" class="stat-badge-xl-val">0</div>
            </div>
        </div>
    </div>

    <div id="goal-badge" class="goal-badge-wrapper">
        <div id="goal-stripe" class="goal-badge-club-stripe"></div>
        <div class="goal-badge-main-content">
            <div class="goal-badge-top-row">
                <span class="goal-badge-alert-text">GOOOL!!!</span>
                <span id="goal-time" class="goal-badge-match-time">00'</span>
            </div>
            <div class="goal-badge-bottom-row">
                <span id="goal-team" class="goal-badge-team-name">TEAM</span>
                <span id="goal-player" class="goal-badge-player-info">ZAWODNIK</span>
            </div>
        </div>
    </div>

    <script>
        function updateOverlay() {
            // 1. Synchronizacja Wyniku i Czasu z Twojego Głównego Panelu Realtime
            const homeName = localStorage.getItem('home_name') || 'GOSPODARZE';
            const awayName = localStorage.getItem('away_name') || 'GOŚCIE';
            const homeScore = localStorage.getItem('home_score') || '0';
            const awayScore = localStorage.getItem('away_score') || '0';
            const matchTime = localStorage.getItem('match_time') || '00:00';
            const matchPart = localStorage.getItem('match_part') || '1H';

            document.getElementById('home-name').innerText = homeName.toUpperCase();
            document.getElementById('away-name').innerText = awayName.toUpperCase();
            document.getElementById('hud-score').innerText = `${homeScore} - ${awayScore}`;
            document.getElementById('hud-time').innerText = matchTime;
            document.getElementById('hud-part').innerText = matchPart;

            // Logotypy w Scoreboardzie
            const homeLogo = localStorage.getItem('home_logo');
            const awayLogo = localStorage.getItem('away_logo');
            const hLogoEl = document.getElementById('home-logo');
            const aLogoEl = document.getElementById('away-logo');

            if (homeLogo) { hLogoEl.src = homeLogo; hLogoEl.style.display = 'block'; } else { hLogoEl.style.display = 'none'; }
            if (awayLogo) { aLogoEl.src = awayLogo; aLogoEl.style.display = 'block'; } else { aLogoEl.style.display = 'none'; }

            // 2. Synchronizacja Statystyk Indywidualnych (Z Twojego nowego formularza)
            const statBadge = document.getElementById('stat-badge');
            if (localStorage.getItem('stat_visible') === 'true') {
                // Odczyt z pól formularza
                const currentText = localStorage.getItem('stat_text') || 'STRZAŁY NA BRAMKĘ'; // Kategoria
                const currentPlayer = localStorage.getItem('stat_player') || 'ZAWODNIK'; // Nazwisko wpisane z palca
                const currentVal = localStorage.getItem('stat_value') || '1'; // Wartość

                // Przypisanie do pól w overlayu (Górny nagłówek = Kategoria, Główny tekst = Nazwisko zawodnika)
                document.getElementById('stat-main-title').innerText = currentText.toUpperCase();
                document.getElementById('stat-title').innerText = currentPlayer.toUpperCase();
                document.getElementById('stat-value').innerText = currentVal;
                
                statBadge.style.visibility = 'visible';
                statBadge.style.opacity = '1';
            } else {
                statBadge.style.visibility = 'hidden';
                statBadge.style.opacity = '0';
            }

            // 3. Obsługa powiadomienia o Golach
            const goalBadge = document.getElementById('goal-badge');
            if (localStorage.getItem('goal_visible') === 'true') {
                document.getElementById('goal-time').innerText = (localStorage.getItem('goal_time') || '00') + "'";
                document.getElementById('goal-team').innerText = (localStorage.getItem('goal_team') || 'TEAM').toUpperCase();
                document.getElementById('goal-player').innerText = (localStorage.getItem('goal_player') || 'ZAWODNIK').toUpperCase();
                
                const goalStripeColor = localStorage.getItem('goal_color') || '#ff0055';
                document.getElementById('goal-stripe').style.backgroundColor = goalStripeColor;
                document.getElementById('goal-team').style.color = goalStripeColor;

                goalBadge.style.visibility = 'visible';
                goalBadge.style.opacity = '1';
                goalBadge.style.transform = 'translateX(-50%) translateY(0)';
            } else {
                goalBadge.style.transform = 'translateX(-50%) translateY(150px)';
                goalBadge.style.visibility = 'hidden';
                goalBadge.style.opacity = '0';
            }
        }

        // Pooling 100ms dla ultra płynnej reakcji na przyciski z panelu
        setInterval(updateOverlay, 100);
        window.onload = updateOverlay;
    </script>
</body>
</html>
