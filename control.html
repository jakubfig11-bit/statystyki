<!DOCTYPE html>
<html lang="pl" style="background: #11141a !important; overflow-y: auto !important;">
<head>
    <meta charset="UTF-8">
    <title>Panel Kontrolny - Sterowanie Realtime</title>
    <style>
        html, body { background: #11141a !important; overflow-y: auto !important; font-family: 'Segoe UI', Arial, sans-serif; color: #fff; padding: 15px; margin: 0; }
        .control-container { max-width: 950px; margin: 0 auto; background: #1a1f29; padding: 20px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        h2, h3 { margin-top: 0; text-transform: uppercase; color: #00ffaa; border-bottom: 1px solid #2d3748; padding-bottom: 6px; }
        .grid-two { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        .section-box { background: #242b38; padding: 15px; border-radius: 8px; border: 1px solid #2d3748; margin-bottom: 15px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #a0aec0; margin-bottom: 4px; text-transform: uppercase; }
        input[type="text"], select, textarea { width: 100%; padding: 8px; background: #11141a; border: 1px solid #3f4e66; color: #fff; border-radius: 4px; box-sizing: border-box; }
        input[type="color"] { width: 100%; height: 38px; background: #11141a; border: 1px solid #3f4e66; padding: 2px; cursor: pointer; border-radius: 4px; }
        .flex-row { display: flex; gap: 10px; align-items: center; }
        button { background: #00ffaa; color: #000; border: none; padding: 10px 14px; font-weight: bold; text-transform: uppercase; border-radius: 4px; cursor: pointer; }
        button:hover { background: #00cc88; }
        .btn-danger { background: #ff4d4d; color: white; }
        .btn-danger:hover { background: #cc3333; }
        .btn-secondary { background: #4a5568; color: white; }
        .btn-primary { background: #4facfe; color: white; }
        .btn-primary:hover { background: #00f2fe; }
        
        .score-display-box { display: flex; justify-content: center; align-items: center; gap: 40px; background: #11141a; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .score-num { font-size: 42px; font-weight: bold; color: #00ffaa; font-family: monospace; text-align: center; margin: 5px 0; }
        .timer-large { font-size: 32px; font-weight: bold; font-family: monospace; background: #242b38; padding: 5px 15px; border-radius: 4px; }
        
        .tab-menu { display: flex; gap: 5px; background: #11141a; padding: 5px; border-radius: 6px; margin-bottom: 10px; }
        .tab-btn { flex: 1; background: transparent; color: #a0aec0; padding: 8px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .tab-btn.active { background: #4facfe; color: white; }
    </style>
</head>
<body>

<div class="control-container">
    <h2>Meczowy Panel Sterowania Realtime</h2>
    
    <div class="score-display-box">
        <div>
            <div style="text-align:center; font-weight:bold; text-transform:uppercase;">GOSPODARZE</div>
            <div class="score-num" id="home-score-display">0</div>
            <div class="flex-row">
                <button id="home-minus" class="btn-secondary">-1</button>
                <button id="home-plus">+1</button>
            </div>
        </div>
        
        <div style="text-align: center;">
            <label>Aktualny Czas</label>
            <div class="timer-large" id="control-timer-display">00:00</div>
            <div class="flex-row" style="margin-top: 8px; justify-content: center;">
                <button id="btn-timer-start">START</button>
                <button id="btn-timer-reset" class="btn-danger">RESET</button>
            </div>
        </div>

        <div>
            <div style="text-align:center; font-weight:bold; text-transform:uppercase;">GOŚCIE</div>
            <div class="score-num" id="away-score-display">0</div>
            <div class="flex-row">
                <button id="away-minus" class="btn-secondary">-1</button>
                <button id="away-plus">+1</button>
            </div>
        </div>
    </div>

    <div class="grid-two">
        <div class="section-box">
            <h3>Gospodarze (Personalizacja)</h3>
            <div class="form-group">
                <label>Nazwa Drużyny</label>
                <input type="text" id="home-name-input" value="TORINO">
            </div>
            <div class="form-group">
                <label>Trener</label>
                <input type="text" id="home-coach-input" value="TRENER GOSPODARZY">
            </div>
            <div class="grid-two" style="margin-bottom:0; grid-template-columns: 1fr 1fr 1fr;">
                <div class="form-group">
                    <label>Kolor Główny</label>
                    <input type="color" id="home-color-input" value="#00f2fe">
                </div>
                <div class="form-group">
                    <label>Kolor Tekstu</label>
                    <input type="color" id="home-textcolor-input" value="#ffffff">
                </div>
                <div class="form-group" style="grid-column: span 1;">
                    <label>Link do herbu (URL)</label>
                    <input type="text" id="home-logo-input" placeholder="https://link-do-grafiki.png">
                </div>
            </div>
        </div>
        
        <div class="section-box">
            <h3>Goście (Personalizacja)</h3>
            <div class="form-group">
                <label>Nazwa Drużyny</label>
                <input type="text" id="away-name-input" value="ELCHE">
            </div>
            <div class="form-group">
                <label>Trener</label>
                <input type="text" id="away-coach-input" value="TRENER GOŚCI">
            </div>
            <div class="grid-two" style="margin-bottom:0; grid-template-columns: 1fr 1fr 1fr;">
                <div class="form-group">
                    <label>Kolor Główny</label>
                    <input type="color" id="away-color-input" value="#ff0055">
                </div>
                <div class="form-group">
                    <label>Kolor Tekstu</label>
                    <input type="color" id="away-textcolor-input" value="#ffffff">
                </div>
                <div class="form-group" style="grid-column: span 1;">
                    <label>Link do herbu (URL)</label>
                    <input type="text" id="away-logo-input" placeholder="https://link-do-grafiki.png">
                </div>
            </div>
        </div>
    </div>

    <div class="grid-two">
        <div class="section-box">
            <label>Część meczu / Połowa</label>
            <select id="period-select">
                <option value="1H">1. Połowa</option>
                <option value="2H">2. Połowa</option>
                <option value="OT">Dogrywka</option>
            </select>
        </div>
        <div class="section-box" style="display: flex; align-items: flex-end; justify-content: gap; gap: 10px;">
            <button id="btn-swap" class="btn-secondary" style="width: 50%;">Zamień Strony (Swap)</button>
            <button id="btn-force-update" class="btn-primary" style="width: 50%;">Wymuś synchronizację</button>
        </div>
    </div>

    <div class="section-box">
        <h3>Składy i Rezerwowi</h3>
        <div class="tab-menu">
            <button id="tab-home" class="tab-btn active">Gospodarze</button>
            <button id="tab-away" class="tab-btn">Goście</button>
        </div>
        <div class="form-group">
            <label>Skład na Boisko (Format: "Numer. Nazwisko" — Każdy w nowej linii)</label>
            <textarea id="lineup-main-input" rows="5" placeholder="1. Bramkarz&#10;2. Zawodnik"></textarea>
        </div>
        <div class="form-group">
            <label>Zawodnicy Rezerwowi (Każdy w nowej linii)</label>
            <textarea id="lineup-bench-input" rows="2" placeholder="12. Rezerwowy 1&#10;14. Rezerwowy 2"></textarea>
        </div>
        <button id="btn-save-lineups" class="btn-primary">Zapisz zmiany w składzie</button>
    </div>

    <div class="section-box" style="border: 2px solid #ffcc00;">
        <h3>System Bramkowy (Dynamiczna Belka Animowana)</h3>
        <div class="form-group">
            <label>Nazwisko / Nick zawodnika, który strzelił bramkę</label>
            <input type="text" id="goal-scorer-input" placeholder="np. 9. LEWANDOWSKI">
        </div>
        <div class="flex-row">
            <button id="btn-goal-home" style="background: #4facfe; color: #fff; flex: 1;">Gol dla GOSPODARZY (+1 i Animacja)</button>
            <button id="btn-goal-away" style="background: #ff0055; color: #fff; flex: 1;">Gol dla GOŚCI (+1 i Animacja)</button>
        </div>
    </div>

    <div class="section-box" style="border: 2px solid #00ffaa;">
        <h3>Zarządzanie Kwadratem Statystyk (Wysuwany Panel)</h3>
        <div class="grid-two" style="margin-bottom: 10px;">
            <div class="form-group">
                <label>Nazwisko / Zawodnik</label>
                <input type="text" id="stat-player-input" placeholder="np. 10. KOWALSKI">
            </div>
            <div class="form-group">
                <label>Kategoria</label>
                <select id="stat-category-select">
                    <option value="Strzały na bramkę">Strzały na bramkę</option>
                    <option value="Gol!">Gol!</option>
                    <option value="Asysta">Asysta</option>
                    <option value="Faul">Faul</option>
                    <option value="Żółta kartka">Żółta kartka</option>
                    <option value="Czerwona kartka">Czerwona kartka</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Wartość</label>
            <input type="text" id="stat-value-input" value="1" style="width: 100px;">
        </div>
        
        <div class="flex-row">
            <button id="btn-show-stat" style="background: #00ffaa; color: #000; flex: 1; padding: 12px;">Zastosuj i WYSUŃ panel statystyk</button>
        </div>
    </div>

    <div class="section-box">
        <h3>Sterowanie Widokiem Boiska w OBS</h3>
        <div class="flex-row">
            <button id="btn-show-lineup-home" class="btn-primary">Pokaż Skład Gospodarzy</button>
            <button id="btn-show-lineup-away" class="btn-primary">Pokaż Skład Gości</button>
            <button id="btn-hide-lineup" class="btn-danger">Schowaj Boisko</button>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body>
</html>
