<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel Kontrolny - Supabase</title>
    <style>
        body { background: #11141a; font-family: 'Segoe UI', Arial, sans-serif; color: #fff; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; background: #1a1f29; padding: 25px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        h2, h3 { margin-top: 0; text-transform: uppercase; color: #00ffaa; border-bottom: 1px solid #2d3748; padding-bottom: 6px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .box { background: #242b38; padding: 15px; border-radius: 8px; border: 1px solid #2d3748; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #a0aec0; margin-bottom: 4px; text-transform: uppercase; }
        input[type="text"], select, textarea { width: 100%; padding: 8px; background: #11141a; border: 1px solid #3f4e66; color: #fff; border-radius: 4px; box-sizing: border-box; }
        input[type="color"] { width: 100%; height: 38px; background: #11141a; border: 1px solid #3f4e66; padding: 2px; cursor: pointer; border-radius: 4px; }
        .flex { display: flex; gap: 10px; align-items: center; }
        button { background: #00ffaa; color: #000; border: none; padding: 10px 14px; font-weight: bold; text-transform: uppercase; border-radius: 4px; cursor: pointer; }
        button:hover { background: #00cc88; }
        .btn-danger { background: #ff4d4d; color: white; }
        .btn-danger:hover { background: #cc3333; }
        .btn-secondary { background: #4a5568; color: white; }
        .score-box { display: flex; justify-content: center; align-items: center; gap: 40px; background: #11141a; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .score-num { font-size: 48px; font-weight: bold; color: #00ffaa; font-family: monospace; text-align: center; }
        .timer-large { font-size: 36px; font-weight: bold; font-family: monospace; background: #242b38; padding: 5px 20px; border-radius: 4px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>Meczowy Panel Zdany (Supabase)</h2>
    
    <div class="score-box">
        <div>
            <div style="text-align:center; font-weight:bold;">GOSPODARZE</div>
            <div class="score-num" id="dsp-score-home">0</div>
            <div class="flex">
                <button onclick="changeScore('home', -1)" class="btn-secondary">-1</button>
                <button onclick="changeScore('home', 1)">+1</button>
            </div>
        </div>
        
        <div>
            <div class="timer-large" id="dsp-timer">00:00</div>
            <div class="flex" style="margin-top: 10px; justify-content: center;">
                <button onclick="toggleTimer()" id="btn-timer">START</button>
                <button onclick="resetTimer()" class="btn-danger">RESET</button>
            </div>
        </div>

        <div>
            <div style="text-align:center; font-weight:bold;">GOŚCIE</div>
            <div class="score-num" id="dsp-score-away">0</div>
            <div class="flex">
                <button onclick="changeScore('away', -1)" class="btn-secondary">-1</button>
                <button onclick="changeScore('away', 1)">+1</button>
            </div>
        </div>
    </div>

    <div class="grid">
        <div class="box">
            <h3>Gospodarze</h3>
            <div class="form-group">
                <label>Nazwa Drużyny</label>
                <input type="text" id="inp-home-name" value="TORINO" oninput="queuePush()">
            </div>
            <div class="form-group">
                <label>Trener</label>
                <input type="text" id="inp-home-coach" value="TRENER A" oninput="queuePush()">
            </div>
            <div class="grid" style="grid-template-columns: 1fr 1fr; margin-bottom:0;">
                <div class="form-group">
                    <label>Kolor Główny</label>
                    <input type="color" id="inp-home-color" value="#4facfe" onchange="queuePush()">
                </div>
                <div class="form-group">
                    <label>Kolor Tekstu</label>
                    <input type="color" id="inp-home-textcolor" value="#ffffff" onchange="queuePush()">
                </div>
            </div>
            <div class="form-group">
                <label>Link do herbu</label>
                <input type="text" id="inp-home-logo" placeholder="URL grafiki" oninput="queuePush()">
            </div>
        </div>
        
        <div class="box">
            <h3>Goście</h3>
            <div class="form-group">
                <label>Nazwa Drużyny</label>
                <input type="text" id="inp-away-name" value="ELCHE" oninput="queuePush()">
            </div>
            <div class="form-group">
                <label>Trener</label>
                <input type="text" id="inp-away-coach" value="TRENER B" oninput="queuePush()">
            </div>
            <div class="grid" style="grid-template-columns: 1fr 1fr; margin-bottom:0;">
                <div class="form-group">
                    <label>Kolor Główny</label>
                    <input type="color" id="inp-away-color" value="#ff0055" onchange="queuePush()">
                </div>
                <div class="form-group">
                    <label>Kolor Tekstu</label>
                    <input type="color" id="inp-away-textcolor" value="#ffffff" onchange="queuePush()">
                </div>
            </div>
            <div class="form-group">
                <label>Link do herbu</label>
                <input type="text" id="inp-away-logo" placeholder="URL grafiki" oninput="queuePush()">
            </div>
        </div>
    </div>

    <div class="grid">
        <div class="box">
            <h3>Kwadrat Statystyk</h3>
            <div class="form-group">
                <label>Zawodnik</label>
                <input type="text" id="stat-player" value="KOWALSKI">
            </div>
            <div class="form-group">
                <label>Kategoria / Opis</label>
                <input type="text" id="stat-cat" value="Strzały na bramkę">
            </div>
            <div class="form-group">
                <label>Wartość</label>
                <input type="text" id="stat-val" value="1">
            </div>
            <div class="flex">
                <button onclick="setStatsState(true)">Pokaż</button>
                <button onclick="setStatsState(false)" class="btn-danger">Ukryj</button>
            </div>
        </div>

        <div class="box">
            <h3>Składy i Widok</h3>
            <div class="form-group">
                <label>Połowa / Część</label>
                <select id="inp-period" onchange="queuePush()">
                    <option value="1H">1. Połowa</option>
                    <option value="2H">2. Połowa</option>
                </select>
            </div>
            <div class="form-group">
                <label>Skład Główny (Max 5 linii)</label>
                <textarea id="inp-lineup" rows="3" placeholder="1. GK zawodnik..." oninput="queuePush()"></textarea>
            </div>
            <div class="form-group">
                <label>Rezerwowi</label>
                <textarea id="inp-bench" rows="2" placeholder="Rezerwowi..." oninput="queuePush()"></textarea>
            </div>
            <div class="flex">
                <button onclick="setPitchView('home')">Pokaż Dom</button>
                <button onclick="setPitchView('away')">Pokaż Gość</button>
                <button onclick="setPitchView('hide')" class="btn-danger">Ukryj Boisko</button>
            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://puhnsjqbqmojjouhsjnk.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1aG5zanFicW1vampvdWhzam5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjg4MDgsImV4cCI6MjA5NTgwNDgwOH0.fBFk7OyEeQ8T_v-tzXAffcDb1xfvgeVZfOvq2WqDC7k";

    let state = {
        homeName: "TORINO", homeCoach: "TRENER A", homeColor: "#4facfe", homeTextColor: "#ffffff", homeLogo: "", homeScore: 0,
        awayName: "ELCHE", awayCoach: "TRENER B", awayColor: "#ff0055", awayTextColor: "#ffffff", awayLogo: "", awayScore: 0,
        timerSeconds: 0, timerRunning: false, period: "1H",
        statPlayer: "KOWALSKI", statCat: "Strzały na bramkę", statVal: "1", showStat: false,
        currentMain: "", currentBench: "", pitchView: "hide"
    };

    let pushTimeout = null;
    let timerInterval = null;

    function queuePush() {
        state.homeName = document.getElementById('inp-home-name').value;
        state.homeCoach = document.getElementById('inp-home-coach').value;
        state.homeColor = document.getElementById('inp-home-color').value;
        state.homeTextColor = document.getElementById('inp-home-textcolor').value;
        state.homeLogo = document.getElementById('inp-home-logo').value;

        state.awayName = document.getElementById('inp-away-name').value;
        state.awayCoach = document.getElementById('inp-away-coach').value;
        state.awayColor = document.getElementById('inp-away-color').value;
        state.awayTextColor = document.getElementById('inp-away-textcolor').value;
        state.awayLogo = document.getElementById('inp-away-logo').value;

        state.period = document.getElementById('inp-period').value;
        state.currentMain = document.getElementById('inp-lineup').value;
        state.currentBench = document.getElementById('inp-bench').value;

        clearTimeout(pushTimeout);
        pushTimeout = setTimeout(pushToSupabase, 200);
    }

    function changeScore(team, val) {
        let key = team + 'Score';
        state[key] = Math.max(0, state[key] + val);
        document.getElementById('dsp-score-' + team).innerText = state[key];
        pushToSupabase();
    }

    function toggleTimer() {
        if (!state.timerRunning) {
            state.timerRunning = true;
            document.getElementById('btn-timer').innerText = 'PAUZA';
            timerInterval = setInterval(() => {
                state.timerSeconds++;
                let min = Math.floor(state.timerSeconds / 60).toString().padStart(2, '0');
                let sec = (state.timerSeconds % 60).toString().padStart(2, '0');
                document.getElementById('dsp-timer').innerText = min + ':' + sec;
                if(state.timerSeconds % 2 === 0) pushToSupabase(); // push co 2 sekundy stopera
            }, 1000);
        } else {
            state.timerRunning = false;
            document.getElementById('btn-timer').innerText = 'START';
            clearInterval(timerInterval);
            pushToSupabase();
        }
    }

    function resetTimer() {
        state.timerRunning = false;
        state.timerSeconds = 0;
        document.getElementById('btn-timer').innerText = 'START';
        clearInterval(timerInterval);
        document.getElementById('dsp-timer').innerText = '00:00';
        pushToSupabase();
    }

    function setStatsState(status) {
        state.statPlayer = document.getElementById('stat-player').value;
        state.statCat = document.getElementById('stat-cat').value;
        state.statVal = document.getElementById('stat-val').value;
        state.showStat = status;
        pushToSupabase();
    }

    function setPitchView(side) {
        state.pitchView = side;
        pushToSupabase();
    }

    async function pushToSupabase() {
        try {
            await fetch(`${SUPABASE_URL}/rest/v1/match_states?id=eq.1`, {
                method: 'PATCH',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify(state)
            });
        } catch (e) { console.error(e); }
    }

    window.onload = async () => {
        // pobierz aktualny stan z bazy na start
        try {
            let res = await fetch(`${SUPABASE_URL}/rest/v1/match_states?id=eq.1`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            let data = await res.json();
            if(data && data[0]) {
                state = data[0];
                document.getElementById('inp-home-name').value = state.homeName;
                document.getElementById('inp-home-coach').value = state.homeCoach;
                document.getElementById('inp-home-color').value = state.homeColor;
                document.getElementById('inp-home-textcolor').value = state.homeTextColor;
                document.getElementById('inp-home-logo').value = state.homeLogo;
                document.getElementById('inp-away-name').value = state.awayName;
                document.getElementById('inp-away-coach').value = state.awayCoach;
                document.getElementById('inp-away-color').value = state.awayColor;
                document.getElementById('inp-away-textcolor').value = state.awayTextColor;
                document.getElementById('inp-away-logo').value = state.awayLogo;
                document.getElementById('dsp-score-home').innerText = state.homeScore;
                document.getElementById('dsp-score-away').innerText = state.awayScore;
                document.getElementById('inp-period').value = state.period;
                document.getElementById('inp-lineup').value = state.currentMain;
                document.getElementById('inp-bench').value = state.currentBench;
                let min = Math.floor(state.timerSeconds / 60).toString().padStart(2, '0');
                let sec = (state.timerSeconds % 60).toString().padStart(2, '0');
                document.getElementById('dsp-timer').innerText = min + ':' + sec;
            }
        } catch(e){}
    }
</script>
</body>
</html>
