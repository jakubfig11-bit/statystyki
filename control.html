<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broadcast HUD - Control Panel</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="control-body">

    <div class="control-panel">
        <header>
            <h1>🏆 BROADCAST CONTROL PANEL</h1>
            <p>Status: <span id="db-status" class="status-badge">Łączenie...</span></p>
        </header>

        <div class="panel-grid">
            <div class="panel-card full-width">
                <h3>📊 KONFIGURACJA DRUŻYN</h3>
                <div class="team-control-row">
                    <div class="team-input-group">
                        <label>GOSPODARZE</label>
                        <input type="text" id="ctrl-home-name" value="HOME" placeholder="Nazwa klubu">
                        <input type="text" id="ctrl-home-logo" value="" placeholder="Link do herbu (Imgur)">
                        <div class="color-picker-wrapper">
                            <label>Kolor główny:</label>
                            <input type="color" id="ctrl-home-color" value="#0052cc">
                        </div>
                        <div class="score-actions">
                            <button onclick="changeScore('home', -1)">-</button>
                            <span id="ctrl-home-score" class="score-val">0</span>
                            <button onclick="changeScore('home', 1)">+</button>
                        </div>
                    </div>

                    <div class="vs-label">VS</div>

                    <div class="team-input-group">
                        <label>GOŚCIE</label>
                        <input type="text" id="ctrl-away-name" value="AWAY" placeholder="Nazwa klubu">
                        <input type="text" id="ctrl-away-logo" value="" placeholder="Link do herbu (Imgur)">
                        <div class="color-picker-wrapper">
                            <label>Kolor główny:</label>
                            <input type="color" id="ctrl-away-color" value="#ff0044">
                        </div>
                        <div class="score-actions">
                            <button onclick="changeScore('away', -1)">-</button>
                            <span id="ctrl-away-score" class="score-val">0</span>
                            <button onclick="changeScore('away', 1)">+</button>
                        </div>
                    </div>
                </div>
                <button class="btn-primary" onclick="updateMatchNames()">Zastosuj ustawienia klubów & herby</button>
            </div>

            <div class="panel-card">
                <h3>⏱️ KONTROLA CZASU</h3>
                <div class="timer-display" id="ctrl-timer">00:00</div>
                <div class="timer-buttons">
                    <button class="btn-success" onclick="toggleTimer()">START / PAUZA</button>
                    <button class="btn-danger" onclick="resetTimer()">RESET</button>
                </div>
            </div>

            <div class="panel-card">
                <h3>🔥 AKCJE LIVE</h3>
                <div class="goal-trigger-box">
                    <input type="text" id="ctrl-scorer-name" placeholder="Nazwisko strzelca...">
                    <select id="ctrl-scorer-team">
                        <option value="home">Gospodarze</option>
                        <option value="away">Goście</option>
                    </select>
                    <button class="btn-neon-yellow" onclick="triggerGoalAnimation()">⚽ TRANSMITUJ GOLA!</button>
                </div>
                <div style="margin-top: 15px;">
                    <button id="btn-lineup-toggle" class="btn-purple" onclick="toggleLineups()">POKAŻ SKŁADY</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            initControlPanel();
        });
    </script>
</body>
</html>
