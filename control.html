<!DOCTYPE html>
<html lang="pl" style="background: #11141a !important; overflow-y: auto !important;">
<head>
    <meta charset="UTF-8">
    <title>PANEL KONTROLNY - Boisko z Kulkami</title>
    <style>
        html, body {
            background: #11141a !important;
            overflow-y: auto !important;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #fff;
            padding: 15px;
            margin: 0;
        }
        .control-container {
            max-width: 900px;
            margin: 0 auto;
            background: #1a1f29;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        h2, h3 {
            margin-top: 0;
            text-transform: uppercase;
            color: #00ffaa;
            border-bottom: 1px solid #2d3748;
            padding-bottom: 6px;
        }
        .grid-two {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
        }
        .section-box {
            background: #242b38;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #2d3748;
        }
        .form-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            font-size: 11px;
            font-weight: bold;
            color: #a0aec0;
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        input[type="text"], select, textarea {
            width: 100%;
            padding: 8px;
            background: #11141a;
            border: 1px solid #3f4e66;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .flex-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        button {
            background: #00ffaa;
            color: #000;
            border: none;
            padding: 10px 14px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: #00cc88; }
        .btn-danger { background: #ff4d4d; color: white; }
        .btn-danger:hover { background: #cc3333; }
        .btn-secondary { background: #4a5568; color: white; }
        
        .score-display-box {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            background: #11141a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .score-num {
            font-size: 42px;
            font-weight: bold;
            color: #00ffaa;
            font-family: monospace;
            margin: 5px 0;
            text-align: center;
        }
        .timer-large {
            font-size: 32px;
            font-weight: bold;
            font-family: monospace;
            background: #242b38;
            padding: 5px 15px;
            border-radius: 4px;
        }
        .tab-menu {
            display: flex;
            gap: 5px;
            background: #11141a;
            padding: 5px;
            border-radius: 6px;
            margin-bottom: 10px;
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            color: #a0aec0;
            padding: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .tab-btn.active {
            background: #4facfe;
            color: white;
        }
    </style>
</head>
<body>

<div class="control-container">
    <h2>Panel Kontrolny Meczu</h2>
    
    <!-- WYNIKI I CZAS -->
    <div class="score-display-box">
        <div>
            <div id="label-home" style="text-align:center; font-weight:bold;">GOSPODARZE</div>
            <div class="score-num" id="dsp-home-score">0</div>
            <div class="flex-row">
                <button onclick="changeScore('home', -1)" class="btn-secondary">-1</button>
                <button onclick="changeScore('home', 1)">+1</button>
            </div>
        </div>
        
        <div style="text-align: center;">
            <label>Stoper</label>
            <div class="timer-large" id="dsp-timer">00:00</div>
            <div class="flex-row" style="margin-top: 8px; justify-content: center;">
                <button id="btn-start" onclick="toggleTimer()">START</button>
                <button class="btn-danger" onclick="resetTimer()">RESET</button>
            </div>
        </div>

        <div>
            <div id="label-away" style="text-align:center; font-weight:bold;">GOŚCIE</div>
            <div class="score-num" id="dsp-away-score">0</div>
            <div class="flex-row">
                <button onclick="changeScore('away', -1)" class="btn-secondary">-1</button>
                <button onclick="changeScore('away', 1)">+1</button>
            </div>
        </div>
    </div>

    <!-- NAZWY DRUŻYN -->
    <div class="grid-two">
        <div class="section-box">
            <h3>Gospodarze</h3>
            <div class="form-group">
                <label>Nazwa</label>
                <input type="text" id="inp-home-name" value="TORINO" oninput="syncTeams()">
            </div>
        </div>
        <div class="section-box">
            <h3>Goście</h3>
            <div class="form-group">
                <label>Nazwa</label>
                <input type="text" id="inp-away-name" value="ELCHE" oninput="syncTeams()">
            </div>
        </div>
    </div>

    <!-- CZĘŚĆ MECZU -->
    <div class="section-box" style="margin-bottom: 20px;">
        <label>Połowa / Część meczu</label>
        <select id="inp-period" onchange="syncTeams()">
            <option value="1H">1. POŁOWA</option>
            <option value="2H">2. POŁOWA</option>
            <option value="OT">DOGRYWKA</option>
        </select>
    </div>

    <!-- EDYTOR SKŁADÓW (KULKI BOISKA) -->
    <div class="section-box" style="margin-bottom: 20px;">
        <h3>Wprowadzanie Składów na Boisko</h3>
        <div class="tab-menu">
            <button id="tab-h" class="tab-btn active" onclick="switchTab('home')">SKŁAD: GOSPODARZE</button>
            <button id="tab-a" class="tab-btn" onclick="switchTab('away')">SKŁAD: GOŚCIE</button>
        </div>
        <div class="form-group">
            <label id="textarea-label">Wpisz maksymalnie 5 zawodników (każdy w nowej linii):</label>
            <textarea id="inp-lineup-text" rows="6" placeholder="1. Bramkarz&#10;2. Obrońca&#10;3. Pomocnik" oninput="saveCurrentLineup()"></textarea>
        </div>
    </div>

    <!-- KONTROLA WIZUALIZACJI -->
    <div class="section-box">
        <h3>Sterowanie boiskiem w OBS</h3>
        <div class="flex-row">
            <button onclick="togglePitch('home')" style="background: #4facfe; color: #fff;">Pokaż Boisko Gospodarzy</button>
            <button onclick="togglePitch('away')" style="background: #4facfe; color: #fff;">Pokaż Boisko Gości</button>
            <button onclick="togglePitch('hide')" class="btn-danger">Schowaj Boisko</button>
        </div>
    </div>

</div>

<script>
    let sHome = 0, sAway = 0, tSeconds = 0, tInterval = null;
    let activeTab = 'home';

    function syncTeams() {
        const hName = document.getElementById('inp-home-name').value;
        const aName = document.getElementById('inp-away-name').value;
        
        localStorage.setItem('teamHome', hName);
        localStorage.setItem('teamAway', aName);
        localStorage.setItem('match_period', document.getElementById('inp-period').value);
        
        document.getElementById('label-home').innerText = hName.toUpperCase();
        document.getElementById('label-away').innerText = aName.toUpperCase();
    }

    function changeScore(team, val) {
        if(team === 'home') {
            sHome = Math.max(0, sHome + val);
            document.getElementById('dsp-home-score').innerText = sHome;
            localStorage.setItem('scoreHome', sHome);
        } else {
            sAway = Math.max(0, sAway + val);
            document.getElementById('dsp-away-score').innerText = sAway;
            localStorage.setItem('scoreAway', sAway);
        }
    }

    function toggleTimer() {
        const btn = document.getElementById('btn-start');
        if(tInterval) {
            clearInterval(tInterval);
            tInterval = null;
            btn.innerText = "START";
            btn.style.background = "#00ffaa";
        } else {
            btn.innerText = "STOP";
            btn.style.background = "#ffcc00";
            tInterval = setInterval(() => {
                tSeconds++;
                let m = Math.floor(tSeconds / 60).toString().padStart(2, '0');
                let s = (tSeconds % 60).toString().padStart(2, '0');
                let sStr = `${m}:${s}`;
                document.getElementById('dsp-timer').innerText = sStr;
                localStorage.setItem('match_timer_string', sStr);
            }, 1000);
        }
    }

    function resetTimer() {
        clearInterval(tInterval);
        tInterval = null;
        tSeconds = 0;
        document.getElementById('dsp-timer').innerText = "00:00";
        localStorage.setItem('match_timer_string', "00:00");
        document.getElementById('btn-start').innerText = "START";
        document.getElementById('btn-start').style.background = "#00ffaa";
    }

    function switchTab(side) {
        activeTab = side;
        if(side === 'home') {
            document.getElementById('tab-h').classList.add('active');
            document.getElementById('tab-a').classList.remove('active');
            document.getElementById('textarea-label').innerText = "Skład: GOSPODARZE (max 5 linii):";
            document.getElementById('inp-lineup-text').value = localStorage.getItem('lineupHome') || '';
        } else {
            document.getElementById('tab-a').classList.add('active');
            document.getElementById('tab-h').classList.remove('active');
            document.getElementById('textarea-label').innerText = "Skład: GOŚCIE (max 5 linii):";
            document.getElementById('inp-lineup-text').value = localStorage.getItem('lineupAway') || '';
        }
    }

    function saveCurrentLineup() {
        const val = document.getElementById('inp-lineup-text').value;
        if(activeTab === 'home') {
            localStorage.setItem('lineupHome', val);
        } else {
            localStorage.setItem('lineupAway', val);
        }
    }

    function togglePitch(action) {
        if(action === 'home') {
            localStorage.setItem('showAwayLineup', 'false');
            localStorage.setItem('showHomeLineup', 'true');
        } else if(action === 'away') {
            localStorage.setItem('showHomeLineup', 'false');
            localStorage.setItem('showAwayLineup', 'true');
        } else {
            localStorage.setItem('showHomeLineup', 'false');
            localStorage.setItem('showAwayLineup', 'false');
        }
    }

    window.onload = () => {
        localStorage.clear();
        syncTeams();
        localStorage.setItem('scoreHome', 0);
        localStorage.setItem('scoreAway', 0);
        localStorage.setItem('match_timer_string', "00:00");
        localStorage.setItem('showHomeLineup', 'false');
        localStorage.setItem('showAwayLineup', 'false');
    };
</script>
</body>
</html>
