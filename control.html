<!DOCTYPE html>
<html lang="pl" style="background: #11141a !important; overflow-y: auto !important;">
<head>
    <meta charset="UTF-8">
    <title>Panel Kontrolny - Sterowanie Ręczne</title>
    <style>
        html, body { background: #11141a !important; overflow-y: auto !important; font-family: 'Segoe UI', Arial, sans-serif; color: #fff; padding: 15px; margin: 0; }
        .control-container { max-width: 950px; margin: 0 auto; background: #1a1f29; padding: 20px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        h2, h3 { margin-top: 0; text-transform: uppercase; color: #00ffaa; border-bottom: 1px solid #2d3748; padding-bottom: 6px; }
        .grid-two { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        .section-box { background: #242b38; padding: 15px; border-radius: 8px; border: 1px solid #2d3748; margin-bottom: 15px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #a0aec0; margin-bottom: 4px; text-transform: uppercase; }
        input[type="text"], select, textarea { width: 100%; padding: 8px; background: #11141a; border: 1px solid #3f4e66; color: #fff; border-radius: 4px; box-sizing: border-box; }
        input[type="color"] { width: 100%; height: 38px; background: #11141a; border: 1px solid #3f4e66; padding: 2px; cursor: pointer; border-radius: 4px; }
        .flex-row { display: flex; gap: 10px; align-items: center; }
        button { background: #00ffaa; color: #000; border: none; padding: 10px 14px; font-weight: bold; text-transform: uppercase; border-radius: 4px; cursor: pointer; }
        button:hover { background: #00cc88; }
        .btn-danger { background: #ff4d4d; color: white; }
        .btn-danger:hover { background: #cc3333; }
        .btn-secondary { background: #4a5568; color: white; }
        .btn-primary { background: #4facfe; color: white; }
        .btn-primary:hover { background: #00f2fe; }
        
        .score-display-box { display: flex; justify-content: center; align-items: center; gap: 40px; background: #11141a; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .score-num { font-size: 42px; font-weight: bold; color: #00ffaa; font-family: monospace; text-align: center; margin: 5px 0; }
        .timer-large { font-size: 32px; font-weight: bold; font-family: monospace; background: #242b38; padding: 5px 15px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="control-container">
    <h2>Meczowy Panel Sterowania</h2>
    
    <div class="score-display-box">
        <div>
            <div style="text-align:center; font-weight:bold; text-transform:uppercase;">GOSPODARZE</div>
            <div class="score-num" id="dsp-score-home">0</div>
            <div class="flex-row">
                <button onclick="changeScore('home', -1)" class="btn-secondary">-1</button>
                <button onclick="changeScore('home', 1)">+1</button>
            </div>
        </div>
        
        <div style="text-align: center;">
            <label>Aktualny Czas</label>
            <div class="timer-large" id="dsp-timer">00:00</div>
            <div class="flex-row" style="margin-top: 8px; justify-content: center;">
                <button onclick="toggleTimer()" id="btn-timer-trigger">START</button>
                <button onclick="resetTimer()" class="btn-danger">RESET</button>
            </div>
        </div>

        <div>
            <div style="text-align:center; font-weight:bold; text-transform:uppercase;">GOŚCIE</div>
            <div class="score-num" id="dsp-score-away">0</div>
            <div class="flex-row">
                <button onclick="changeScore('away', -1)" class="btn-secondary">-1</button>
                <button onclick="changeScore('away', 1)">+1</button>
            </div>
        </div>
    </div>

    <div class="grid-two">
        <div class="section-box">
            <h3>Gospodarze (Personalizacja)</h3>
            <div class="form-group">
                <label>Nazwa Drużyny</label>
                <input type="text" id="inp-home-name" value="TORINO" oninput="syncData()">
            </div>
            <div class="form-group">
                <label>Trener</label>
                <input type="text" id="inp-home-coach" value="TRENER GOSPODARZY" oninput="syncData()">
            </div>
            <div class="grid-two" style="margin-bottom:0; grid-template-columns: 1fr 1fr 2fr;">
                <div class="form-group">
                    <label>Kolor</label>
                    <input type="color" id="inp-home-color" value="#00f2fe" onchange="syncData()">
                </div>
                <div class="form-group">
                    <label>Tekst</label>
                    <input type="color" id="inp-home-textcolor" value="#ffffff" onchange="syncData()">
                </div>
                <div class="form-group">
                    <label>Link do herbu (URL)</label>
                    <input type="text" id="inp-home-logo" placeholder="https://link-do-grafiki.png" oninput="syncData()">
                </div>
            </div>
        </div>
        
        <div class="section-box">
            <h3>Goście (Personalizacja)</h3>
            <div class="form-group">
                <label>Nazwa Drużyny</label>
                <input type="text" id="inp-away-name" value="ELCHE" oninput="syncData()">
            </div>
            <div class="form-group">
                <label>Trener</label>
                <input type="text" id="inp-away-coach" value="TRENER GOŚCI" oninput="syncData()">
            </div>
            <div class="grid-two" style="margin-bottom:0; grid-template-columns: 1fr 1fr 2fr;">
                <div class="form-group">
                    <label>Kolor</label>
                    <input type="color" id="inp-away-color" value="#ff0055" onchange="syncData()">
                </div>
                <div class="form-group">
                    <label>Tekst</label>
                    <input type="color" id="inp-away-textcolor" value="#ffffff" onchange="syncData()">
                </div>
                <div class="form-group">
                    <label>Link do herbu (URL)</label>
                    <input type="text" id="inp-away-logo" placeholder="https://link-do-grafiki.png" oninput="syncData()">
                </div>
            </div>
        </div>
    </div>

    <div class="grid-two">
        <div class="section-box">
            <label>Część meczu / Połowa</label>
            <select id="inp-period" onchange="syncData()">
                <option value="1H">1. Połowa</option>
                <option value="2H">2. Połowa</option>
                <option value="OT">Dogrywka</option>
            </select>
        </div>
        <div class="section-box" style="display: flex; align-items: flex-end;">
            <button onclick="swapTeams()" class="btn-secondary" style="width: 100%;">Zamień Strony (Swap)</button>
        </div>
    </div>

    <div class="section-box" style="border: 2px solid #ffcc00;">
        <h3>System Bramkowy (Wysuwana Animacja z dołu)</h3>
        <div class="form-group">
            <label>Nick / Nazwisko zawodnika, który strzelił</label>
            <input type="text" id="inp-goal-scorer" placeholder="np. 9. Zawodnik">
        </div>
        <div class="flex-row">
            <button onclick="triggerGoal('home')" style="background: #4facfe; color: #fff; flex: 1;">Gol dla Gospodarzy (+1 i Animacja)</button>
            <button onclick="triggerGoal('away')" style="background: #ff0055; color: #fff; flex: 1;">Gol dla Gości (+1 i Animacja)</button>
        </div>
    </div>

    <div class="section-box" style="border: 2px solid #00ffaa;">
        <h3>Zarządzanie Kwadratem Statystyk</h3>
        <div class="grid-two" style="margin-bottom: 10px;">
            <div class="form-group">
                <label>Zawodnik</label>
                <input type="text" id="stat-player-name" placeholder="np. 10. KOWALSKI">
            </div>
            <div class="form-group">
                <label>Kategoria</label>
                <select id="stat-category">
                    <option value="Strzały na bramkę">Strzały na bramkę</option>
                    <option value="Gol!">Gol!</option>
                    <option value="Asysta">Asysta</option>
                    <option value="Faul">Faul</option>
                    <option value="Żółta kartka">Żółta kartka</option>
                    <option value="Czerwona kartka">Czerwona kartka</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Wartość</label>
            <input type="text" id="stat-value" value="1" style="width: 100px;">
        </div>
        
        <div class="flex-row">
            <button onclick="controlStatPanel('show')" style="background: #00ffaa; color: #000; flex: 1;">Pokaż Statystyki</button>
            <button onclick="controlStatPanel('hide')" class="btn-danger">Ukryj Statystyki</button>
        </div>
    </div>

    <div class="section-box">
        <h3>Składy drużyn</h3>
        <div class="grid-two">
            <div>
                <label>Gospodarze - Skład Boisko</label>
                <textarea id="lineup-home-main" rows="5" oninput="saveCurrentLineup()"></textarea>
                <label style="margin-top:5px;">Gospodarze - Rezerwa</label>
                <textarea id="lineup-home-bench" rows="2" oninput="saveCurrentLineup()"></textarea>
            </div>
            <div>
                <label>Goście - Skład Boisko</label>
                <textarea id="lineup-away-main" rows="5" oninput="saveCurrentLineup()"></textarea>
                <label style="margin-top:5px;">Goście - Rezerwa</label>
                <textarea id="lineup-away-bench" rows="2" oninput="saveCurrentLineup()"></textarea>
            </div>
        </div>
        <div class="flex-row">
            <button onclick="togglePitch('home')" class="btn-primary">Pokaż Boisko Gospodarzy</button>
            <button onclick="togglePitch('away')" class="btn-primary">Pokaż Boisko Gości</button>
            <button onclick="togglePitch('hide')" class="btn-danger">Schowaj Boisko</button>
        </div>
    </div>
</div>

<script>
    let timerInterval = null;

    function syncData() {
        localStorage.setItem('homeName', document.getElementById('inp-home-name').value.toUpperCase());
        localStorage.setItem('homeCoach', document.getElementById('inp-home-coach').value.toUpperCase());
        localStorage.setItem('homeColor', document.getElementById('inp-home-color').value);
        localStorage.setItem('homeTextColor', document.getElementById('inp-home-textcolor').value);
        localStorage.setItem('homeLogo', document.getElementById('inp-home-logo').value);

        localStorage.setItem('awayName', document.getElementById('inp-away-name').value.toUpperCase());
        localStorage.setItem('awayCoach', document.getElementById('inp-away-coach').value.toUpperCase());
        localStorage.setItem('awayColor', document.getElementById('inp-away-color').value);
        localStorage.setItem('awayTextColor', document.getElementById('inp-away-textcolor').value);
        localStorage.setItem('awayLogo', document.getElementById('inp-away-logo').value);

        localStorage.setItem('period', document.getElementById('inp-period').value);
    }

    function changeScore(team, val) {
        let key = (team === 'home') ? 'homeScore' : 'awayScore';
        let cur = parseInt(localStorage.getItem(key)) || 0;
        let next = Math.max(0, cur + val);
        localStorage.setItem(key, next);
        document.getElementById(`dsp-score-${team}`).innerText = next;
    }

    function toggleTimer() {
        let running = localStorage.getItem('timerRunning') === 'true';
        if(!running) {
            localStorage.setItem('timerRunning', 'true');
            document.getElementById('btn-timer-trigger').innerText = 'PAUZA';
            document.getElementById('btn-timer-trigger').className = 'btn-danger';
            
            let seconds = parseInt(localStorage.getItem('timerSeconds')) || 0;
            timerInterval = setInterval(() => {
                seconds++;
                localStorage.setItem('timerSeconds', seconds);
                updateTimerDisplay(seconds);
            }, 1000);
        } else {
            localStorage.setItem('timerRunning', 'false');
            document.getElementById('btn-timer-trigger').innerText = 'START';
            document.getElementById('btn-timer-trigger').className = '';
            clearInterval(timerInterval);
        }
    }

    function resetTimer() {
        localStorage.setItem('timerRunning', 'false');
        localStorage.setItem('timerSeconds', 0);
        document.getElementById('btn-timer-trigger').innerText = 'START';
        document.getElementById('btn-timer-trigger').className = '';
        clearInterval(timerInterval);
        updateTimerDisplay(0);
    }

    function updateTimerDisplay(totalSecs) {
        let m = Math.floor(totalSecs / 60).toString().padStart(2, '0');
        let s = (totalSecs % 60).toString().padStart(2, '0');
        document.getElementById('dsp-timer').innerText = `${m}:${s}`;
    }

    function triggerGoal(side) {
        changeScore(side, 1);
        let scorer = document.getElementById('inp-goal-scorer').value || "ZAWODNIK";
        let teamName = localStorage.getItem(side === 'home' ? 'homeName' : 'awayName') || "KLUB";
        let teamColor = localStorage.getItem(side === 'home' ? 'homeColor' : 'awayColor') || "#fff";
        let teamLogo = localStorage.getItem(side === 'home' ? 'homeLogo' : 'awayLogo') || "";
        
        let totalSecs = parseInt(localStorage.getItem('timerSeconds')) || 0;
        let m = Math.floor(totalSecs / 60).toString().padStart(2, '0');
        let s = (totalSecs % 60).toString().padStart(2, '0');
        let goalTime = `${m}:${s}`;

        localStorage.setItem('goal_event_trigger', JSON.stringify({
            timestamp: Date.now(),
            side: side,
            scorer: scorer.toUpperCase(),
            team: teamName,
            color: teamColor,
            logo: teamLogo,
            time: goalTime
        }));
        
        document.getElementById('inp-goal-scorer').value = "";
    }

    function controlStatPanel(action) {
        if(action === 'show') {
            localStorage.setItem('stat_cur_player', document.getElementById('stat-player-name').value || "ZAWODNIK");
            localStorage.setItem('stat_cur_cat', document.getElementById('stat-category').value);
            localStorage.setItem('stat_cur_val', document.getElementById('stat-value').value);
            localStorage.setItem('showStatPanel', 'true');
        } else {
            localStorage.setItem('showStatPanel', 'false');
        }
    }

    function togglePitch(action) {
        if(action === 'home') {
            localStorage.setItem('showAwayLineup', 'false');
            localStorage.setItem('showHomeLineup', 'true');
        } else if(action === 'away') {
            localStorage.setItem('showHomeLineup', 'false');
            localStorage.setItem('showAwayLineup', 'true');
        } else {
            localStorage.setItem('showHomeLineup', 'false');
            localStorage.setItem('showAwayLineup', 'false');
        }
    }

    function saveCurrentLineup() {
        localStorage.setItem('lineupHome', document.getElementById('lineup-home-main').value);
        localStorage.setItem('benchHome', document.getElementById('lineup-home-bench').value);
        localStorage.setItem('lineupAway', document.getElementById('lineup-away-main').value);
        localStorage.setItem('benchAway', document.getElementById('lineup-away-bench').value);
    }

    window.onload = () => {
        localStorage.clear();
        syncData();
        saveCurrentLineup();
        localStorage.setItem('homeScore', 0);
        localStorage.setItem('awayScore', 0);
        localStorage.setItem('timerSeconds', 0);
        localStorage.setItem('timerRunning', 'false');
    }
</script>
</body>
</html>
