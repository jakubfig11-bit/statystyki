<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Sterowania Overlayem V2</title>
    <link rel="stylesheet" href="style-v3.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="control-body">

    <div class="control-panel">
        <div class="control-header">
            <h2>Panel Sterowania Overlayem V2 (Supabase)</h2>
            <div class="btn-group">
                <button id="btn-swap" class="btn btn-neon">🔄 ZAMIEŃ STRONY DRUŻYŃ (SWAP)</button>
                <button id="btn-force-update" class="btn btn-red">💥 Zaktualizuj Dane w OBS</button>
            </div>
        </div>

        <div class="control-grid">
            <div class="control-card">
                <h3>Drużyny, Barwy i Logo</h3>
                
                <div style="margin-bottom: 15px;">
                    <label>Gospodarz (HUD)</label>
                    <input type="text" id="home-name-input" value="ATLETICO">
                </div>
                
                <div style="margin-bottom: 25px;">
                    <label>Gość (HUD)</label>
                    <input type="text" id="away-name-input" value="BODO">
                </div>

                <div class="form-group-row" style="margin-bottom: 15px;">
                    <div>
                        <label>Kolor Główny Gosp.</label>
                        <input type="color" id="home-color-input" value="#ff0055">
                    </div>
                    <div>
                        <label>Kolor Tekstu Gosp.</label>
                        <input type="color" id="home-textcolor-input" value="#ffffff">
                    </div>
                </div>

                <div class="form-group-row" style="margin-bottom: 25px;">
                    <div>
                        <label>Kolor Główny Gościa</label>
                        <input type="color" id="away-color-input" value="#ffff00">
                    </div>
                    <div>
                        <label>Kolor Tekstu Gościa</label>
                        <input type="color" id="away-textcolor-input" value="#000000">
                    </div>
                </div>

                <div style="margin-bottom: 15px;">
                    <label>Logo Gospodarza (Adres URL .png)</label>
                    <input type="text" id="home-logo-input" placeholder="https://i.imgur.com/logo1.png">
                </div>
                
                <div>
                    <label>Logo Gościa (Adres URL .png)</label>
                    <input type="text" id="away-logo-input" placeholder="https://i.imgur.com/logo2.png">
                </div>
            </div>

            <div class="control-card">
                <h3>Kontrola Meczu</h3>
                
                <div class="score-actions" style="margin-bottom: 15px;">
                    <span>GOSPODARZE</span>
                    <div class="btn-group">
                        <button id="home-minus" class="btn btn-red">-1</button>
                        <span id="home-score-display" class="score-display">0</span>
                        <button id="home-plus" class="btn btn-neon">+1</button>
                    </div>
                </div>

                <div class="score-actions" style="margin-bottom: 25px;">
                    <span>GOŚCIE</span>
                    <div class="btn-group">
                        <button id="away-minus" class="btn btn-red">-1</button>
                        <span id="away-score-display" class="score-display">0</span>
                        <button id="away-plus" class="btn btn-neon">+1</button>
                    </div>
                </div>

                <div class="timer-control-display" id="control-timer-display">00:00</div>

                <div class="btn-group" style="margin-bottom: 25px; justify-content: center;">
                    <button id="btn-timer-start" class="btn btn-neon" style="min-width: 100px;">START</button>
                    <button id="btn-timer-reset" class="btn btn-red">RESET</button>
                </div>

                <div>
                    <label>Połowa / Część Meczu</label>
                    <select id="period-select">
                        <option value="1H">1. POŁOWA (1H)</option>
                        <option value="2H">2. POŁOWA (2H)</option>
                        <option value="DOG">DOGRYWKA (ET)</option>
                        <option value="PK">KARNE (PK)</option>
                        <option value="KON">KONIEC MECZU</option>
                    </select>
                </div>
            </div>

            <div class="control-card">
                <h3>Popup Statystyk Zawodnika</h3>
                
                <div style="margin-bottom: 15px;">
                    <label>Wybierz Drużynę (Kolor Belki)</label>
                    <select id="stat-team-select">
                        <option value="home">GOSPODARZE</option>
                        <option value="away">GOŚCIE</option>
                    </select>
                </div>

                <div style="margin-bottom: 15px;">
                    <label>Nick Zawodnika</label>
                    <input type="text" id="stat-player-input" placeholder="np. 10. KOWALSKI">
                </div>

                <div style="margin-bottom: 15px;">
                    <label>Kategoria Statystyki</label>
                    <select id="stat-category-select">
                        <option value="Celne Podania">Celne Podania</option>
                        <option value="Strzały / Celne">Strzały / Celne</option>
                        <option value="Faule">Faule</option>
                        <option value="Żółte Kartki">Żółte Kartki</option>
                        <option value="Obrony Bramkarza">Obrony Bramkarza</option>
                        <option value="Dystans (km)">Dystans (km)</option>
                    </select>
                </div>

                <div style="margin-bottom: 25px;">
                    <label>Wartość (Liczba)</label>
                    <input type="number" id="stat-value-input" value="1">
                </div>

                <button id="btn-show-stat" class="btn btn-neon btn-block" style="padding: 15px;">📊 POKAŻ STATYSTYKĘ (9 SEKUND)</button>
            </div>

            <div class="control-card wide-card">
                <h3>Aktywacja Animacji Gola</h3>
                <div class="form-group-row">
                    <button id="btn-goal-home" class="btn btn-neon btn-block" style="padding: 15px; background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); color: #000;">⚽ GOL DLA GOSPODARZY!</button>
                    <button id="btn-goal-away" class="btn btn-neon btn-block" style="padding: 15px; background: linear-gradient(135deg, #fff200 0%, #ffc400 100%); color: #000;">⚽ GOL DLA GOŚCI!</button>
                </div>
            </div>

            <div class="control-card wide-card">
                <h3>Prezentacja Składu Meczowego (Lineup TV)</h3>
                <div style="display: flex; gap: 20px; margin-bottom: 20px;">
                    <button id="btn-show-lineup-home" class="btn btn-neon" style="flex: 1; padding: 12px;">👁️ POKAŻ SKŁAD GOSPODARZY</button>
                    <button id="btn-show-lineup-away" class="btn btn-neon" style="flex: 1; padding: 12px; background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%); color: #000;">👁️ POKAŻ SKŁAD GOŚCI</button>
                    <button id="btn-hide-lineup" class="btn btn-red" style="flex: 1; padding: 12px;">❌ UKRYJ SKŁAD (OFF)</button>
                </div>

                <div class="form-group-row">
                    <div style="flex: 1.2;">
                        <label style="color:#00f2fe">Zawodnicy Pierwszego Składu (Wpisz numer i nick, jeden pod drugim)</label>
                        <textarea id="lineup-main-input" rows="6" style="font-family: monospace; font-size: 13px;" placeholder="Wpisz dokładnie 5 zawodników w formatach (przykład):&#10;1. KOWALSKI&#10;12. NOWAK&#10;7. LEWANDOWSKI&#10;9. BONIEK&#10;10. ZIELIŃSKI"></textarea>
                    </div>
                    <div style="flex: 1;">
                        <label>Rezerwowi (Oddzielaj enterem)</label>
                        <textarea id="lineup-bench-input" rows="6" style="font-family: monospace; font-size: 13px;" placeholder="np.&#10;22. BORUC&#10;14. MILIK"></textarea>
                    </div>
                    <div style="flex: 0.8;">
                        <label>Trener / Coach</label>
                        <input type="text" id="lineup-coach-input" placeholder="np. C. MICHNIEWICZ" style="margin-bottom: 15px;">
                        
                        <button id="btn-save-lineups" class="btn btn-red btn-block" style="height: calc(100% - 40px); background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: #fff;">💾 ZAPISZ SKŁADY W BAZIE</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="control.js"></script>

</script>

</body>
</html>
