<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broadcast Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0d0f14;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 20px;
        }
        .container {
            max-width: 900px; margin: 0 auto;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #232731; padding-bottom: 10px; margin-bottom: 20px;
        }
        .status-badge {
            padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; background: #ff4444;
        }
        .status-badge.connected { background: #00c851; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card {
            background: #121620; border: 1px solid #232731; border-radius: 12px; padding: 20px; box-sizing: border-box;
        }
        h2, h3 { margin-top: 0; font-weight: 700; letter-spacing: 0.5px; }
        label { display: block; font-size: 12px; color: #838996; font-weight: 600; margin-bottom: 5px; margin-top: 10px; }
        input[type="text"], input[type="color"], select {
            width: 100%; padding: 10px; background: #1c2130; border: 1px solid #2d3446; border-radius: 6px;
            color: #fff; font-family: 'Montserrat', sans-serif; box-sizing: border-box;
        }
        .btn {
            width: 100%; padding: 12px; font-weight: 700; border: none; border-radius: 6px; cursor: pointer;
            font-family: 'Montserrat', sans-serif; margin-top: 10px; text-transform: uppercase; transition: 0.2s;
        }
        .btn-primary { background: #0052cc; color: white; }
        .btn-primary:hover { background: #0066ff; }
        .btn-success { background: #00c851; color: white; font-size: 16px; padding: 15px; }
        .btn-success:hover { background: #00e676; }
        .btn-danger { background: #ff4444; color: white; }
        .btn-purple { background: #aa00ff; color: white; }
        .btn-purple:hover { background: #d500f9; }
        .score-box {
            display: flex; align-items: center; justify-content: center; gap: 15px; font-size: 36px; font-weight: 800; margin: 15px 0;
        }
        .score-btn {
            width: 40px; height: 40px; background: #2d3446; border: none; color: white; border-radius: 6px; font-size: 20px; font-weight: 700; cursor: pointer;
        }
        .score-btn:hover { background: #3e4861; }
        .timer-display { font-size: 48px; font-weight: 800; text-align: center; color: #f5b041; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🏆 BROADCAST CONTROL PANEL</h2>
        <div id="db-status" class="status-badge">ŁĄCZENIE...</div>
    </div>

    <div class="grid-2">
        <div class="card">
            <h3>📊 TABLICA WYNIKÓW</h3>
            <div style="display: flex; justify-content: space-around; text-align: center;">
                <div>
                    <div style="font-size: 12px; font-weight:700; color:#838996;">GOSPODARZE</div>
                    <div class="score-box">
                        <button class="score-btn" onclick="changeScore('home', -1)">-</button>
                        <span id="ctrl-home-score">0</span>
                        <button class="score-btn" onclick="changeScore('home', 1)">+</button>
                    </div>
                </div>
                <div style="font-size: 24px; font-weight: 800; align-self: center; color: #ff4444;">VS</div>
                <div>
                    <div style="font-size: 12px; font-weight:700; color:#838996;">GOŚCIE</div>
                    <div class="score-box">
                        <button class="score-btn" onclick="changeScore('away', -1)">-</button>
                        <span id="ctrl-away-score">0</span>
                        <button class="score-btn" onclick="changeScore('away', 1)">+</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>⏱️ KONTROLA CZASU</h3>
            <div id="ctrl-timer" class="timer-display">00:00</div>
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 10px;">
                <button class="btn btn-success" onclick="toggleTimer()">START / PAUZA</button>
                <button class="btn btn-danger" onclick="resetTimer()">RESET</button>
            </div>
        </div>
    </div>

    <div class="card" style="margin-bottom: 20px;">
        <h3>⚙️ USTAWIENIA DRUŻYN (NAZWY, LOGO, KOLORY)</h3>
        <div class="grid-2">
            <div>
                <h4>GOSPODARZE</h4>
                <label>Nazwa:</label>
                <input type="text" id="ctrl-home-name">
                <label>URL Logo:</label>
                <input type="text" id="ctrl-home-logo" placeholder="https://...">
                <label>Kolor akcentu:</label>
                <input type="color" id="ctrl-home-color" value="#0052cc">
            </div>
            <div>
                <h4>GOŚCIE</h4>
                <label>Nazwa:</label>
                <input type="text" id="ctrl-away-name">
                <label>URL Logo:</label>
                <input type="text" id="ctrl-away-logo" placeholder="https://...">
                <label>Kolor akcentu:</label>
                <input type="color" id="ctrl-away-color" value="#ff0044">
            </div>
        </div>
        <button class="btn btn-primary" onclick="updateMatchNames()">Zapisz i aktualizuj dane drużyn</button>
    </div>

    <div class="card" style="margin-bottom: 20px;">
        <h3>📋 SKŁAD WYJŚCIOWY I SZTAB (WIDOK BOISKA)</h3>
        <div class="grid-2">
            <div>
                <label>Trener drużyny:</label>
                <input type="text" id="ctrl-home-coach" placeholder="np. PEP GUARDIOLA">
            </div>
            <div>
                <label>Zawodnicy rezerwowi (oddziel przecinkami):</label>
                <input type="text" id="ctrl-home-subs" placeholder="np. Dkny, Dejv, Messi">
            </div>
        </div>
        
        <div style="margin-top: 15px;">
            <label>Wyjściowa piątka (Ważny format: <b>Numer. Nazwisko</b> np. <i>1. NEUER</i>):</label>
            <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 5px;">
                <div><label style="margin:0; font-size:10px;">Poz 1 (GK):</label><input type="text" id="ctrl-home-p1" placeholder="1. NEUER"></div>
                <div><label style="margin:0; font-size:10px;">Poz 2 (DEF P):</label><input type="text" id="ctrl-home-p2" placeholder="2. KIWIOR"></div>
                <div><label style="margin:0; font-size:10px;">Poz 3 (DEF L):</label><input type="text" id="ctrl-home-p3" placeholder="3. TYAN"></div>
                <div><label style="margin:0; font-size:10px;">Poz 4 (MID):</label><input type="text" id="ctrl-home-p4" placeholder="4. NEYMAR"></div>
                <div><label style="margin:0; font-size:10px;">Poz 5 (ATT):</label><input type="text" id="ctrl-home-p5" placeholder="5. RONALDO"></div>
            </div>
        </div>
        <button class="btn btn-primary" style="margin-top: 15px;" onclick="updateMatchNames()">Zapisz i synchronizuj skład</button>
    </div>

    <div class="card">
        <h3>🔥 AKCJE I ANIMACJE LIVE</h3>
        <div class="grid-2">
            <div>
                <label>Wywoływacz Gola - Strzelec:</label>
                <input type="text" id="ctrl-scorer-name" placeholder="Wpisz nick strzelca...">
                <label>Drużyna strzelca:</label>
                <select id="ctrl-scorer-team">
                    <option value="home">Gospodarze (HOME)</option>
                    <option value="away">Goście (AWAY)</option>
                </select>
                <button class="btn btn-danger" style="background:#f1c40f; color:#000; font-size:14px;" onclick="triggerGoalAnimation()">⚽ TRANSMITUJ GOL!</button>
            </div>
            <div style="display: flex; flex-direction: column; justify-content: center;">
                <label>Prezentacja Składów na boisku:</label>
                <button class="btn btn-purple" style="padding: 20px; font-size: 16px;" onclick="toggleLineups()">POKAŻ / UKRYJ SKŁAD</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
    window.addEventListener('DOMContentLoaded', () => {
        initControlPanel();
    });
</script>
</body>
</html>
