<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Kontrolny Meczu</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="control-body">
    <div class="control-panel">
        <header class="control-header">
            <h2>🎛️ PANEL KONTROLNY (WERSJA KOLOR)</h2>
            <div id="control-sync-status" class="status-badge" style="background:#00ebff22; color:#00ebff; border-color:#00ebff;">Supabase Live</div>
        </header>

        <div class="control-grid">
            <div class="control-card wide-card">
                <h3>📊 Drużyny, Wyniki i Barwy Klubowe</h3>
                <div class="form-group-row">
                    <div style="background: rgba(255,255,255,0.02); padding: 15px; border-radius: 6px;">
                        <label style="color:#00ebff;">GOSPODARZE (DOM)</label>
                        <input type="text" id="input-home-name" value="ATLETICO">
                        
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <div>
                                <label>Główny (Tło)</label>
                                <input type="color" id="input-home-color" value="#ff0055" style="height:40px; padding:0;">
                            </div>
                            <div>
                                <label>Tekst/Akcent</label>
                                <input type="color" id="input-home-text" value="#ffffff" style="height:40px; padding:0;">
                            </div>
                        </div>

                        <div class="score-actions">
                            <button class="btn btn-sm" onclick="changeScore('home', -1)">-</button>
                            <span id="control-home-score" class="score-display">0</span>
                            <button class="btn btn-sm btn-neon" onclick="changeScore('home', 1)">+</button>
                        </div>
                    </div>

                    <div class="vs-divider" style="align-self:center;">VS</div>

                    <div style="background: rgba(255,255,255,0.02); padding: 15px; border-radius: 6px;">
                        <label style="color:#ff0055;">GOŚCIE (WYJAZD)</label>
                        <input type="text" id="input-away-name" value="BODO">
                        
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <div>
                                <label>Główny (Tło)</label>
                                <input type="color" id="input-away-color" value="#ffff00" style="height:40px; padding:0;">
                            </div>
                            <div>
                                <label>Tekst/Akcent</label>
                                <input type="color" id="input-away-text" value="#000000" style="height:40px; padding:0;">
                            </div>
                        </div>

                        <div class="score-actions">
                            <button class="btn btn-sm" onclick="changeScore('away', -1)">-</button>
                            <span id="control-away-score" class="score-display">0</span>
                            <button class="btn btn-sm btn-neon" onclick="changeScore('away', 1)">+</button>
                        </div>
                    </div>
                </div>
                <button class="btn btn-block btn-neon" onclick="updateTeams()" style="margin-top:15px;">💥 Zaktualizuj Nazwy i Kolory w OBS</button>
            </div>

            <div class="control-card">
                <h3>⏱️ Zegar Meczowy</h3>
                <div class="timer-control-display" id="control-timer">00:00</div>
                <div class="form-group">
                    <label>Połowa meczu</label>
                    <select id="select-period" onchange="changePeriod()">
                        <option value="1H">1. Połowa (1H)</option>
                        <option value="2H">2. Połowa (2H)</option>
                        <option value="OT">Dogrywka (OT)</option>
                        <option value="PK">Karne (PK)</option>
                    </select>
                </div>
                <div class="btn-group">
                    <button class="btn btn-neon" id="btn-trigger-timer" onclick="toggleTimer()">START</button>
                    <button class="btn btn-red" onclick="resetTimer()">RESET</button>
                </div>
            </div>

            <div class="control-card">
                <h3>🔥 Efekty i Animacje</h3>
                <div class="goal-trigger-box">
                    <h4>⚽ Strzelony Gol</h4>
                    <select id="select-goal-team">
                        <option value="home">Gospodarze</option>
                        <option value="away">Goście</option>
                    </select>
                    <input type="text" id="input-goal-scorer" placeholder="np. 10. KOWALSKI" style="margin: 8px 0;">
                    <button class="btn btn-block btn-red" onclick="triggerGoalAnimation()">🚨 ODPAL GOOOL</button>
                </div>
                <hr style="border:1px solid #222; margin:10px 0;">
                <h4>👥 Składy (Lineups)</h4>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-bottom:5px;">
                    <button class="btn btn-neon btn-sm" onclick="triggerLineupVisual('home', true)">Pokaż Dom</button>
                    <button class="btn btn-red btn-sm" onclick="triggerLineupVisual('home', false)">Ukryj Dom</button>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px;">
                    <button class="btn btn-neon btn-sm" onclick="triggerLineupVisual('away', true)">Pokaż Gość</button>
                    <button class="btn btn-red btn-sm" onclick="triggerLineupVisual('away', false)">Ukryj Gość</button>
                </div>
            </div>

            <div class="control-card wide-card">
                <h3>📋 Edycja Składów (Rozdziel przecinkami)</h3>
                <div class="form-group-row">
                    <textarea id="txt-home-players" rows="3">1. NOWAK, 2. KOWALSKI, 3. PIETRZAK</textarea>
                    <textarea id="txt-away-players" rows="3">12. SMITH, 2. JOHNSON, 3. WILLIAMS</textarea>
                </div>
                <button class="btn btn-block btn-neon" onclick="updateLineupsData()">Zapisz Składy</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
