<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broadcast HUD & Control Panel</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="overlay-view" class="mode-container hidden">
        <div class="scoreboard-wrapper">
            <div class="scoreboard">
                <div class="badge-accent"></div>
                <div class="team home"><span id="hud-home-name">HOME</span></div>
                <div class="score"><span id="hud-home-score">0</span></div>
                <div class="divider">:</div>
                <div class="score"><span id="hud-away-score">0</span></div>
                <div class="team away"><span id="hud-away-name">AWAY</span></div>
                <div class="timer-box">
                    <span id="hud-timer">00:00</span>
                </div>
            </div>
        </div>

        <div id="goal-container" class="goal-container-wrapper hidden">
            <div class="goal-card-tv">
                <div class="goal-card-content">
                    <h2 class="goal-tv-title">GOOOOOL!</h2>
                    <div class="goal-tv-details">
                        <span id="goal-player-name" class="goal-tv-player">ZAWODNIK</span>
                        <span class="goal-tv-bullet">•</span>
                        <span id="goal-team-name" class="goal-tv-team">DRUŻYNA</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
