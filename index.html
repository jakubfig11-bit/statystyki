<!DOCTYPE html>
<html>
<head>
<style>
body{
    margin:0;
    overflow:hidden;
    background:transparent;
}

.banner{
    position:absolute;
    top:50px;
    left:-500px;
    width:500px;
    height:100px;
    background:#e53935;
    color:white;
    font-size:40px;
    display:flex;
    justify-content:center;
    align-items:center;
    animation:slideIn 1s forwards;
}

@keyframes slideIn{
    to{
        left:50px;
    }
}
</style>
</head>
<body>
<div class="banner">
GOOOOL!
</div>
</body>
</html>
